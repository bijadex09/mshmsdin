          **أمثلة على التنسيق المطلوب:**
          • 03:44 | 08:30 | حكم الصلاة في الثياب المتسخة
          • 15:20 | 22:45 | هل يجوز صلاة الجمعة بدون خطبة
          • 01:05:30 | 01:12:15 | شرح حديث الجارية
          • 02:30:15 | 02:38:20 | الفرق بين الزكاة والصدقة

          **تنبيهات مهمة:**
          1. لا تخرج أي شيء غير التنسيق المطلوب
          2. لا تكرر نفس السؤال في مقاطع متعددة
          3. إذا لم تجد سؤالاً واضحاً، لا تخرج شيئاً
          4. تأكد من أن END_TIME بعد START_TIME
          5. افحص النص جيداً لاستخراج كل الأسئلة دون استثناء

