name: YouTube Ultimate QA Extractor

on:
  workflow_dispatch:
    inputs:
      youtube_url:
        description: 'YouTube Video URL'
        required: true
        default: 'https://youtu.be/NdVhKakgGHM'
      telegram_target:
        description: 'Telegram Channel/User ID'
        required: true
        default: '-1004447957881'

jobs:
  process:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup System Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg fontconfig build-essential python3-dev
          npm install -g sharp-cli
          pip install yt-dlp requests webrtcvad-wheels
          pip install --upgrade pip
          pip install --upgrade yt-dlp

      - name: Process Video, Transcript & Gemini Requests API
        env:
          YT_URL: ${{ github.event.inputs.youtube_url }}
          TG_TARGET: ${{ github.event.inputs.telegram_target }}
          COOKIES_TEXT: ${{ secrets.COOKIES_TEXT }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        shell: python
        run: |
          import os
          import sys
          import wave
          import shutil
          import tempfile
          import subprocess
          import requests
          import json
          import urllib.request
          import re
          from typing import List, Tuple

          BOT_TOKEN = "8248329215:AAGl3C96vZQ0B9VuDTX2m7IQt--WHDXJmFI"
          
          YT_URL = os.environ['YT_URL']
          TG_TARGET = os.environ['TG_TARGET']
          COOKIES_TEXT = os.environ.get('COOKIES_TEXT', '')
          GEMINI_KEY = os.environ.get('GEMINI_API_KEY', '')

          BASE_DIR = os.getcwd()
          TEMP_VIDEO = os.path.join(BASE_DIR, "temp_video.mp4")
          COOKIES_FILE = os.path.join(BASE_DIR, "cookies.txt")
          SUB_OUTPUT = os.path.join(BASE_DIR, "sub_file")
          EXPECTED_VTT = os.path.join(BASE_DIR, "sub_file.ar.vtt")
          FINAL_TRANSCRIPT = os.path.join(BASE_DIR, "transcript.txt")

          # إعدادات الصور والخطوط
          FONT_SYSTEM_DIR = os.path.expanduser("~/.local/share/fonts")
          IMAGES_CACHE_DIR = os.path.expanduser("~/.local/share/images")
          FONT_NAME = "ReadexPro-Bold.ttf"
          FONT_FULL_PATH = os.path.join(FONT_SYSTEM_DIR, FONT_NAME)

          BACKGROUND_SHORT_URL = "https://raw.githubusercontent.com/bidjadraft/markdown/refs/heads/main/images/background1.png"
          BACKGROUND_LONG_URL = "https://raw.githubusercontent.com/bidjadraft/markdown/refs/heads/main/images/background.png"
          FONT_URL = "https://raw.githubusercontent.com/bidjadraft/markdown/refs/heads/main/fonts/ReadexPro-Bold.ttf"

          os.makedirs(IMAGES_CACHE_DIR, exist_ok=True)
          os.makedirs(FONT_SYSTEM_DIR, exist_ok=True)

          CACHED_FONT = os.path.join(IMAGES_CACHE_DIR, "ReadexPro-Bold.ttf")
          CACHED_BG_SHORT = os.path.join(IMAGES_CACHE_DIR, "background1.png")
          CACHED_BG_LONG = os.path.join(IMAGES_CACHE_DIR, "background.png")

          # إعدادات الصوت والفيديو
          AUDIO_BITRATE = "96k"
          VIDEO_PRESET = "faster"
          VIDEO_CRF = 20
          SILENCE_THRESHOLD = 0.5
          VAD_AGGRESSIVENESS = 3
          
          # إعدادات التوسيع
          START_OFFSET = -3  # ناقص 3 ثواني (نزيد البداية)
          END_OFFSET = 4     # زائد 4 ثواني (نزيد النهاية)

          def tg_msg(text):
              try:
                  url = f"https://api.telegram.org/bot{BOT_TOKEN}/sendMessage"
                  requests.post(url, json={"chat_id": int(TG_TARGET), "text": text}, timeout=15)
              except: pass

          def tg_send_video(filepath, caption):
              try:
                  url = f"https://api.telegram.org/bot{BOT_TOKEN}/sendVideo"
                  with open(filepath, 'rb') as video:
                      files = {'video': video}
                      data = {'chat_id': int(TG_TARGET), 'caption': caption, 'supports_streaming': True}
                      response = requests.post(url, data=data, files=files, timeout=120)
                      if response.status_code == 200:
                          print(f"✅ Video sent successfully: {filepath}")
                          return True
                      else:
                          print(f"❌ Failed to send video: {response.text}")
                          return False
              except Exception as e:
                  print(f"⚠️ Send video error: {e}")
                  return False

          def get_duration(file_path: str) -> float:
              try:
                  cmd = ['ffprobe', '-v', 'error', '-show_entries', 'format=duration', 
                         '-of', 'default=noprint_wrappers=1:nokey=1', file_path]
                  result = subprocess.run(cmd, capture_output=True, text=True)
                  return float(result.stdout.strip()) if result.stdout.strip() else 0.0
              except:
                  return 0.0

          def run_cmd(cmd):
              try:
                  if isinstance(cmd, list):
                      result = subprocess.run(cmd, capture_output=True, text=True)
                  else:
                      result = subprocess.run(cmd, capture_output=True, text=True, shell=True)
                  return result.returncode == 0
              except:
                  return False

          def seconds_to_time(seconds: float) -> str:
              minutes = int(seconds // 60)
              secs = int(seconds % 60)
              if minutes >= 60:
                  hours = minutes // 60
                  minutes = minutes % 60
                  return f"{hours:02d}:{minutes:02d}:{secs:02d}"
              return f"{minutes:02d}:{secs:02d}"

          def time_to_seconds(time_str: str) -> float:
              """تحويل تنسيق الوقت إلى ثواني"""
              parts = time_str.strip().split(':')
              if len(parts) == 2:  # MM:SS
                  minutes, seconds = map(int, parts)
                  return minutes * 60 + seconds
              elif len(parts) == 3:  # HH:MM:SS
                  hours, minutes, seconds = map(int, parts)
                  return hours * 3600 + minutes * 60 + seconds
              return 0.0

          def adjust_timestamp(start_time: str, end_time: str, video_duration: float) -> Tuple[str, str]:
              """توسيع المقطع بإضافة START_OFFSET للبداية و END_OFFSET للنهاية"""
              start_sec = time_to_seconds(start_time) + START_OFFSET
              end_sec = time_to_seconds(end_time) + END_OFFSET
              
              # التأكد من عدم تجاوز حدود الفيديو
              start_sec = max(0, start_sec)
              end_sec = min(video_duration, end_sec)
              
              # التأكد من أن النهاية بعد البداية
              if end_sec <= start_sec:
                  end_sec = start_sec + 1
              
              return seconds_to_time(start_sec), seconds_to_time(end_sec)

          # دالة قص المقطع
          def extract_clip(video_path: str, start: str, end: str, output_path: str) -> bool:
              return run_cmd([
                  'ffmpeg', '-y',
                  '-i', video_path,
                  '-ss', start,
                  '-to', end,
                  '-c:v', 'libx264', '-preset', VIDEO_PRESET, '-crf', str(VIDEO_CRF),
                  '-c:a', 'aac', '-b:a', AUDIO_BITRATE,
                  '-loglevel', 'error',
                  output_path
              ])

          # دالة إزالة الصمت
          def merge_segments(segments: List, threshold: float) -> List[Tuple[float, float]]:
              if not segments:
                  return []
              merged = []
              cs, ce = segments[0]
              for ns, ne in segments[1:]:
                  if ns - ce <= threshold:
                      ce = max(ce, ne)
                  else:
                      merged.append((cs, ce))
                      cs, ce = ns, ne
              merged.append((cs, ce))
              return [(s, e) for s, e in merged if e - s > 0.5]

          def remove_silence_from_video(input_path: str, output_path: str) -> Tuple[bool, float]:
              try:
                  import webrtcvad
                  vad = webrtcvad.Vad(VAD_AGGRESSIVENESS)
              except ImportError:
                  shutil.copy2(input_path, output_path)
                  return True, 0.0
              
              orig_duration = get_duration(input_path)
              
              with tempfile.TemporaryDirectory() as temp_dir:
                  temp_audio = os.path.join(temp_dir, "audio.wav")
                  
                  if not run_cmd(['ffmpeg', '-y', '-i', input_path, '-ar', '16000', '-ac', '1', temp_audio, '-loglevel', 'quiet']):
                      return False, 0.0
                  
                  try:
                      with wave.open(temp_audio, 'rb') as wav:
                          rate = wav.getframerate()
                          frames = wav.readframes(wav.getnframes())
                  except:
                      return False, 0.0
                  
                  frame_duration = 30
                  frame_size = int(rate * frame_duration / 1000) * 2
                  
                  segments = []
                  speech = False
                  start_time = 0.0
                  
                  for i in range(0, len(frames) - frame_size, frame_size):
                      try:
                          is_speech = vad.is_speech(frames[i:i+frame_size], rate)
                          current_time = i / (rate * 2)
                          
                          if is_speech and not speech:
                              speech = True
                              start_time = max(0, current_time - 0.2)
                          elif not is_speech and speech:
                              speech = False
                              segments.append((start_time, current_time + 0.2))
                      except:
                          continue
                  
                  if speech:
                      segments.append((start_time, len(frames) / (rate * 2)))
                  
                  if not segments:
                      return False, 0.0
                  
                  merged = merge_segments(segments, SILENCE_THRESHOLD)
                  
                  ext = os.path.splitext(input_path)[1]
                  segment_files = []
                  
                  for i, (s, e) in enumerate(merged):
                      duration = e - s
                      seg_file = os.path.join(temp_dir, f"seg_{i:03d}{ext}")
                      
                      cmd = [
                          'ffmpeg', '-y',
                          '-ss', f"{s:.3f}",
                          '-i', input_path,
                          '-t', f"{duration:.3f}",
                          '-c:v', 'libx264', '-preset', VIDEO_PRESET, '-crf', str(VIDEO_CRF),
                          '-c:a', 'aac', '-b:a', AUDIO_BITRATE,
                          '-avoid_negative_ts', 'make_zero',
                          seg_file, '-loglevel', 'quiet'
                      ]
                      
                      if run_cmd(cmd) and os.path.exists(seg_file) and os.path.getsize(seg_file) > 0:
                          segment_files.append(seg_file)
                  
                  if not segment_files:
                      return False, 0.0
                  
                  concat_file = os.path.join(temp_dir, "concat.txt")
                  with open(concat_file, 'w') as f:
                      for seg in segment_files:
                          f.write(f"file '{seg}'\n")
                  
                  if run_cmd(['ffmpeg', '-y', '-f', 'concat', '-safe', '0', '-i', concat_file, '-c', 'copy', output_path, '-loglevel', 'quiet']):
                      new_duration = get_duration(output_path)
                      removed = orig_duration - new_duration
                      if removed < 0:
                          removed = 0
                      return True, removed
              
              return False, 0.0

          # دوال إنشاء الصور
          def get_single_line_font_size(word_count):
              if word_count <= 3:
                  return 90
              elif word_count == 4:
                  return 80
              elif word_count == 5:
                  return 68
              else:
                  return 57

          def split_text_to_two_lines(text):
              words = text.strip().split()
              half = (len(words) + 1) // 2
              return [" ".join(words[:half]), " ".join(words[half:])]

          def create_image_with_title(text, output_path):
              word_count = len(text.strip().split())
              
              if word_count >= 7:
                  bg_image = CACHED_BG_LONG
                  font_size = 70
                  use_multiline = True
              else:
                  bg_image = CACHED_BG_SHORT
                  font_size = get_single_line_font_size(word_count)
                  use_multiline = False
              
              if not os.path.exists(bg_image):
                  fallback_bg = os.path.join(IMAGES_CACHE_DIR, "fallback_bg.png")
                  if not os.path.exists(fallback_bg):
                      subprocess.run(['ffmpeg', '-y', '-f', 'lavfi', '-i', 'color=c=black:s=1080x1920:d=1', '-frames:v', '1', fallback_bg], capture_output=True)
                  bg_to_use = fallback_bg
              else:
                  bg_to_use = bg_image
              
              if not use_multiline:
                  svg = f'''<?xml version="1.0" encoding="UTF-8"?>
          <svg width="1080" height="1920" xmlns="http://www.w3.org/2000/svg">
              <defs>
                  <style>
                      @font-face {{
                          font-family: 'Readex Pro';
                          src: url('{FONT_FULL_PATH}');
                      }}
                      .title {{
                          fill: white;
                          font-family: 'Readex Pro', sans-serif;
                          font-size: {font_size}px;
                          font-weight: bold;
                          text-anchor: middle;
                          filter: drop-shadow(0px 2px 4px rgba(0,0,0,0.5));
                      }}
                  </style>
              </defs>
              <text x="540" y="1390" class="title" direction="rtl">{text}</text>
          </svg>'''
              else:
                  lines = split_text_to_two_lines(text)
                  svg = f'''<?xml version="1.0" encoding="UTF-8"?>
          <svg width="1080" height="1920" xmlns="http://www.w3.org/2000/svg">
              <defs>
                  <style>
                      @font-face {{
                          font-family: 'Readex Pro';
                          src: url('{FONT_FULL_PATH}');
                      }}
                      .title {{
                          fill: white;
                          font-family: 'Readex Pro', sans-serif;
                          font-size: {font_size}px;
                          font-weight: bold;
                          text-anchor: middle;
                          filter: drop-shadow(0px 2px 4px rgba(0,0,0,0.5));
                      }}
                  </style>
              </defs>
              <text x="540" y="1390" class="title" direction="rtl">{lines[0]}</text>
              <text x="540" y="1500" class="title" direction="rtl">{lines[1]}</text>
          </svg>'''
              
              temp_svg = os.path.join(IMAGES_CACHE_DIR, "text_layer.svg")
              with open(temp_svg, "w", encoding="utf-8") as f:
                  f.write(svg)
              
              try:
                  subprocess.run(['sharp', 'composite', temp_svg, '--input', bg_to_use, '--output', output_path], check=True, capture_output=True)
              except:
                  temp_text_png = os.path.join(IMAGES_CACHE_DIR, "temp_text.png")
                  try:
                      subprocess.run(['sharp', '-i', temp_svg, '-o', temp_text_png, '--density', '300'], check=True, capture_output=True)
                      subprocess.run(['ffmpeg', '-y', '-i', bg_to_use, '-i', temp_text_png, '-filter_complex', 'overlay=0:0', '-frames:v', '1', output_path], check=True, capture_output=True)
                  except:
                      return False
                  finally:
                      if os.path.exists(temp_text_png):
                          os.remove(temp_text_png)
              
              if os.path.exists(temp_svg):
                  os.remove(temp_svg)
              
              return os.path.exists(output_path)

          # دالة دمج الفيديو مع الصورة
          def process_tiktok_reel(video_path, image_path, output_path):
              filter_complex = (
                  "[0:v]loop=loop=-1:size=1:start=0,setpts=PTS-STARTPTS,scale=trunc(iw/2)*2:trunc(ih/2)*2[bg]; "
                  "[1:v]setpts=PTS-STARTPTS,crop=ih*4/5:ih:(iw-ow)/2:0,scale=820:1026[v_final]; "
                  "[bg][v_final]overlay=(W-w)/2:150:shortest=1"
              )
              
              cmd = [
                  "ffmpeg", "-y",
                  "-i", image_path,
                  "-i", video_path,
                  "-filter_complex", filter_complex,
                  "-pix_fmt", "yuv420p",
                  "-c:v", "libx264",
                  "-c:a", "aac", "-b:a", AUDIO_BITRATE,
                  "-shortest",
                  output_path
              ]
              
              return run_cmd(cmd)

          # تحميل الأصول
          def download_file(url, dest, name):
              if os.path.exists(dest):
                  return True
              try:
                  urllib.request.urlretrieve(url, dest)
                  return True
              except:
                  return False

          try:
              if not os.path.exists(CACHED_FONT): 
                  download_file(FONT_URL, CACHED_FONT, "font")
              if not os.path.exists(CACHED_BG_SHORT): 
                  download_file(BACKGROUND_SHORT_URL, CACHED_BG_SHORT, "background1")
              if not os.path.exists(CACHED_BG_LONG): 
                  download_file(BACKGROUND_LONG_URL, CACHED_BG_LONG, "background2")
              if not os.path.exists(FONT_FULL_PATH):
                  shutil.copy2(CACHED_FONT, FONT_FULL_PATH)
                  subprocess.run(['fc-cache', '-fv'], capture_output=True)
          except Exception as e: 
              print(f"⚠️ Assets setup warning: {e}")

          if COOKIES_TEXT:
              with open(COOKIES_FILE, "w", encoding="utf-8") as f:
                  f.write(COOKIES_TEXT)
          else:
              print("❌ COOKIES_TEXT secret is missing!")
              tg_msg("❌ خطأ: لم يتم العثور على السيكرت COOKIES_TEXT")
              sys.exit(1)

          command = [
              "yt-dlp", "--cookies", COOKIES_FILE, "--js-runtime", "node",
              "--remote-components", "ejs:github", "-f", "bestvideo+bestaudio/best",
              "--merge-output-format", "mp4", "-o", TEMP_VIDEO, YT_URL
          ]

          print("\n📥 Downloading video...")
          tg_msg("📥 جاري تحميل الفيديو بأعلى دقة...")

          video_success = False
          try:
              result = subprocess.run(command, capture_output=True, text=True)
              video_success = result.returncode == 0 and os.path.exists(TEMP_VIDEO)
          except Exception as e: 
              print(f"❌ Subprocess failed: {e}")

          if not video_success:
              if os.path.exists(COOKIES_FILE): 
                  os.remove(COOKIES_FILE)
              print("❌ Download failed!")
              tg_msg("❌ فشل تحميل الفيديو.")
              sys.exit(1)

          # الحصول على مدة الفيديو الأصلي
          video_duration = get_duration(TEMP_VIDEO)
          print(f"📹 Video duration: {seconds_to_time(video_duration)}")

          print("\n📜 Extracting transcript...")
          srt_command = [
              "yt-dlp", "--cookies", COOKIES_FILE, "--js-runtime", "node",
              "--remote-components", "ejs:github", "--skip-download",
              "--write-auto-sub", "--sub-lang", "ar", "--output", SUB_OUTPUT, YT_URL
          ]

          transcript_exists = False
          try:
              subprocess.run(srt_command, capture_output=True, text=True)
              if os.path.exists(EXPECTED_VTT):
                  with open(EXPECTED_VTT, "r", encoding="utf-8") as vtt_f:
                      vtt_content = vtt_f.read()

                  lines = []
                  for line in vtt_content.split('\n'):
                      line = line.strip()
                      if line and not line.startswith('WEBVTT') and not line.startswith('Kind:') and not line.startswith('Language:') and '-->' not in line:
                          if not lines or lines[-1] != line:
                              lines.append(line)

                  with open(FINAL_TRANSCRIPT, "w", encoding="utf-8") as f:
                      f.write('\n'.join(lines))
                  transcript_exists = True
          except Exception as e: 
              print(f"❌ VTT Extraction failed: {e}")

          if os.path.exists(COOKIES_FILE): 
              os.remove(COOKIES_FILE)

          if not transcript_exists:
              print("❌ Transcript not found!")
              tg_msg("❌ تعذر استخراج ملف الترجمة، توقفت العملية.")
              sys.exit(1)

          if not GEMINI_KEY:
              print("❌ GEMINI_API_KEY secret is missing!")
              tg_msg("❌ خطأ: لم يتم العثور على السيكرت GEMINI_API_KEY")
              sys.exit(1)

          print("\n🤖 Sending transcript to Gemini...")
          tg_msg("🤖 جاري الآن إرسال تفريغ النص إلى جيميناي عبر API للتحليل...")

          try:
              with open(FINAL_TRANSCRIPT, "r", encoding="utf-8") as f:
                  transcript_data = f.read()

              user_prompt = f"""الوثيقة هي نص تفريغ فيديو عربي لجلسة أسئلة وأجوبة دينية. النص منسق كـ 'HH:MM:SS | النص'.

          مهمتك: استخراج جميع الأسئلة والإجابات بدقة، مع تحديد وقت بداية السؤال ووقت نهاية الإجابة لكل مسألة.

          **معايير تحديد بداية السؤال (START_TIME):**
          1. ابحث عن الكلمات المفتاحية: 'سؤال'، 'يسأل'، 'أريد أن أسأل'، 'ما حكم'، 'هل يجوز'، 'ما رأيك'
          2. ابحث عن صيغ الاستفهام: 'هل'، 'متى'، 'كيف'، 'لماذا'، 'أين'
          3. ابحث عن انتقال المتحدث من الحديث العام إلى سؤال محدد
          4. ابدأ من أول كلمة للسؤال، وليس من رد المحاضر

          **معايير تحديد نهاية الإجابة (END_TIME):**
          1. تنتهي الإجابة عندما ينتقل المتحدث إلى سؤال جديد أو موضوع مختلف تماماً
          2. تنتهي عندما يقول المتحدث كلمات مثل: 'هذا والله أعلم'، 'انتهى'، 'ننتقل للسؤال التالي'
          3. تنتهي عندما يبدأ السائل بسؤال جديد أو يعود المتحدث للرد على سائل آخر
          4. لا تقطع الإجابة في منتصفها - تأكد من تغطية كامل الرد على السؤال
          5. إذا كانت الإجابة طويلة ومتشعبة، حاول إيجاد نقطة النهاية الطبيعية للرد على السؤال الأصلي

          **قواعد دقيقة للمقاطع:**
          1. كل مقطع = سؤال واحد + إجابته الكاملة
          2. إذا تحدث المحاضر عن مسألة فرعية ضمن الإجابة، اعتبرها جزءاً من نفس المقطع
          3. إذا عاد المحاضر لنفس السؤال لاحقاً، اعتبره مقطعاً جديداً مستقلاً
          4. المقطع يجب أن يكون متكاملاً ومفهوماً لوحده
          5. لا تخلط بين الأسئلة المختلفة في مقطع واحد

          **تنسيق الإخراج الإلزامي:**
          يجب أن يكون الإخراج بالضبط كالتالي:
          • [START_TIME] | [END_TIME] | [العنوان]
          • [START_TIME] | [END_TIME] | [العنوان]
          • [START_TIME] | [END_TIME] | [العنوان]

          **قواعد الأوقات:**
          1. START_TIME: وقت بداية السؤال (أول كلمة للسؤال)
          2. END_TIME: وقت نهاية الإجابة (آخر كلمة للرد)
          3. للأوقات أقل من ساعة: استخدم تنسيق MM:SS فقط (مثل 03:44، 15:30)
          4. للأوقات أكثر من ساعة: استخدم تنسيق HH:MM:SS (مثل 01:05:30، 02:15:45)

          **قواعد كتابة العناوين:**
          1. العنوان يجب أن يكون سؤالاً مختصراً يعبر عن جوهر المسألة
