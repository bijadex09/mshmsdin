name: YouTube Video Downloader via Secret Cookies

on:
  workflow_dispatch:
    inputs:
      youtube_url:
        description: 'YouTube Video URL'
        required: true
        default: 'https://youtu.be/NdVhKakgGHM'
      telegram_target:
        description: 'Telegram Channel/User ID'
        required: true
        default: '-1004447957881'

jobs:
  process:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup System Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg
          pip install yt-dlp telethon requests Pillow webrtcvad
          pip install --upgrade pip
          pip install --upgrade yt-dlp

      - name: Download Video Standard
        env:
          YT_URL: ${{ github.event.inputs.youtube_url }}
          TG_TARGET: ${{ github.event.inputs.telegram_target }}
          COOKIES_TEXT: ${{ secrets.COOKIES_TEXT }}
        shell: python
        run: |
          import os
          import sys
          import subprocess
          import requests

          BOT_TOKEN = "8248329215:AAGl3C96vZQ0B9VuDTX2m7IQt--WHDXJmFI"
          YT_URL = os.environ['YT_URL']
          TG_TARGET = os.environ['TG_TARGET']
          COOKIES_TEXT = os.environ.get('COOKIES_TEXT', '')
          
          BASE_DIR = os.path.dirname(os.path.abspath(__file__))
          TEMP_VIDEO = os.path.join(BASE_DIR, "temp_video.mp4")
          COOKIES_FILE = os.path.join(BASE_DIR, "cookies.txt")

          def tg_msg(text):
              try:
                  url = f"https://api.telegram.org/bot{BOT_TOKEN}/sendMessage"
                  requests.post(url, json={"chat_id": int(TG_TARGET), "text": text}, timeout=10)
              except: pass

          # إنشاء ملف الكوكيز مؤقتاً من الـ Secret
          if COOKIES_TEXT:
              with open(COOKIES_FILE, "w", encoding="utf-8") as f:
                  f.write(COOKIES_TEXT)
          else:
              print("❌ COOKIES_TEXT secret is missing!")
              tg_msg("❌ خطأ: لم يتم العثور على السيكرت COOKIES_TEXT")
              sys.exit(1)

          def download_video(url):
              command = [
                  "yt-dlp", "--cookies", COOKIES_FILE, "--js-runtime", "node",
                  "--remote-components", "ejs:github", "-f", 
                  "bestvideo[height<=1080][ext=mp4]+bestaudio[ext=m4a]/best[height<=1080][ext=mp4]/best",
                  "--merge-output-format", "mp4", "-o", TEMP_VIDEO, url
              ]
              try:
                  print(f"🚀 Running command via secret cookies: {' '.join(command)}")
                  result = subprocess.run(command, capture_output=True, text=True)
                  print(result.stdout)
                  if result.returncode != 0:
                      print(f"❌ yt-dlp error output:\n{result.stderr}")
                  return result.returncode == 0 and os.path.exists(TEMP_VIDEO)
              except Exception as e: 
                  print(f"❌ Subprocess execution failed: {e}")
                  return False

          print("\n📥 Downloading video via secure secret cookies...")
          tg_msg("📥 جاري التحميل باستخدام الكوكيز المؤمن في الـ Secrets...")

          success = download_video(YT_URL)

          # حذف ملف الكوكيز فوراً بعد انتهاء المحاولة للأمان
          if os.path.exists(COOKIES_FILE): 
              os.remove(COOKIES_FILE)

          if success:
              size_mb = os.path.getsize(TEMP_VIDEO) / (1024 * 1024)
              print(f"✅ Download successful! File size: {size_mb:.2f} MB")
              tg_msg(f"✅ تم تحميل الفيديو بنجاح واكتمال حفظه المباشر!\n📦 الحجم: {size_mb:.2f} ميجابايت.\n\nبانتظار خطوتك التالية...")
          else:
              print("❌ Download method failed!")
              tg_msg("❌ فشل تحميل الفيديو بالرغم من تحديث الكوكيز كـ Secret.")
              sys.exit(1)
