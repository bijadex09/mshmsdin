name: YouTube Video Cutter & Sender

on:
  workflow_dispatch:
    inputs:
      youtube_url:
        description: 'YouTube Video URL'
        required: true
        default: 'https://www.youtube.com/live/R36qfvXK3XQ'
      telegram_target:
        description: 'Telegram Channel/User ID'
        required: true
        default: '-1004447957881'

jobs:
  process:
    runs-on: ubuntu-latest
    steps:
      - name: Setup
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg
          pip install yt-dlp telethon requests Pillow webrtcvad webvtt-py
          pip install --upgrade yt-dlp

      - name: Download Cookies
        run: |
          curl -sL "https://raw.githubusercontent.com/bijadex09/mshmsdin/main/cookies.txt" -o cookies.txt
          echo "Cookies size: $(wc -c < cookies.txt) bytes"
          echo "Cookies lines: $(wc -l < cookies.txt)"

      - name: Process Video
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          YT_URL: ${{ github.event.inputs.youtube_url }}
          TG_TARGET: ${{ github.event.inputs.telegram_target }}
        shell: python
        run: |
          import os, re, json, sys, glob, time, shutil, asyncio, tempfile, subprocess, requests
          from PIL import Image, ImageDraw, ImageFont
          from telethon import TelegramClient
          import yt_dlp
          import webrtcvad
          import wave
          import webvtt

          API_ID = 24629594
          API_HASH = "a79fa760e65af09a85eb2cc97cb2263c"
          BOT_TOKEN = "8248329215:AAGl3C96vZQ0B9VuDTX2m7IQt--WHDXJmFI"
          GEMINI_KEY = os.environ['GEMINI_API_KEY']
          YT_URL = os.environ['YT_URL']
          TG_TARGET = os.environ['TG_TARGET']
          VIDEO = 'video.mp4'
          COOKIES = 'cookies.txt'
          SUBS = 'sub_file.ar.vtt'
          TMP = tempfile.mkdtemp()

          def t2s(t):
              p = list(map(int, t.strip().split(':')))
              return p[0]*3600 + p[1]*60 + p[2] if len(p)==3 else p[0]*60 + p[1] if len(p)==2 else 0

          def s2t(s):
              return f"{int(s//3600):02d}:{int(s%3600//60):02d}:{int(s%60):02d}"

          async def tg_msg(text):
              try:
                  c = TelegramClient('x', API_ID, API_HASH)
                  await c.start(bot_token=BOT_TOKEN)
                  await c.send_message(int(TG_TARGET), text)
                  await c.disconnect()
              except: pass

          def thumbnail(title, path):
              w, h = 1080, 1920
              img = Image.new('RGB', (w,h), '#1a1a2e')
              d = ImageDraw.Draw(img)
              for i in range(h):
                  d.line([(0,i),(w,i)], fill=(26+int(i/h*30), 26+int(i/h*20), 46+int(i/h*40)))
              try:
                  font = ImageFont.truetype("/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf", 50)
              except:
                  font = ImageFont.load_default()
              words, lines, cur = title.split(), [], ""
              for wd in words:
                  t = f"{cur} {wd}" if cur else wd
                  if len(t) <= 22: cur = t
                  else:
                      if cur: lines.append(cur)
                      cur = wd
              if cur: lines.append(cur)
              y = h//3
              for ln in lines:
                  bb = d.textbbox((0,0), ln, font=font)
                  tw, th = bb[2]-bb[0], bb[3]-bb[1]
                  x = (w-tw)//2
                  d.text((x+3,y+3), ln, font=font, fill='#00000080')
                  d.text((x,y), ln, font=font, fill='white')
                  y += th+30
              for i in range(5): d.rectangle([i,i,w-i-1,h-i-1], outline='#e94560')
              img.save(path, 'PNG', quality=95)

          def cut(s, e, o):
              subprocess.run(['ffmpeg','-y','-i',VIDEO,'-ss',s,'-to',e,'-c','copy','-loglevel','error',o], capture_output=True)
              return os.path.isfile(o)

          def merge(v, i, o):
              fc = "[1:v]loop=-1:size=1,setpts=PTS-STARTPTS,scale=1080:1920[img];[0:v]scale=1080:1920:force_original_aspect_ratio=decrease,pad=1080:1920:(ow-iw)/2:(oh-ih)/2[vid];[img][vid]overlay=0:0:shortest=1"
              subprocess.run(['ffmpeg','-y','-i',v,'-i',i,'-filter_complex',fc,'-c:v','libx264','-preset','ultrafast','-crf','28','-c:a','aac','-b:a','96k','-shortest','-loglevel','error',o], capture_output=True)
              return os.path.isfile(o)

          def silence(inp, out):
              td = tempfile.mkdtemp()
              ta = os.path.join(td, 'a.wav')
              subprocess.run(['ffmpeg','-y','-i',inp,'-ar','16000','-ac','1','-loglevel','quiet',ta], capture_output=True)
              if not os.path.isfile(ta): return False
              vad = webrtcvad.Vad(3)
              with wave.open(ta,'rb') as w:
                  rate, frames = w.getframerate(), w.readframes(w.getnframes())
              fs = int(rate*30/1000)*2
              segs, sp, st = [], False, 0.0
              for i in range(0, len(frames)-fs, fs):
                  try:
                      iss = vad.is_speech(frames[i:i+fs], rate)
                      ct = i/(rate*2)
                      if iss and not sp: sp, st = True, max(0, ct-0.3)
                      elif not iss and sp: sp = False; segs.append((st, ct+0.3))
                  except: continue
              if sp: segs.append((st, len(frames)/(rate*2)))
              if not segs: shutil.copy2(inp, out); return True
              ms = [segs[0]]
              for s in segs[1:]:
                  if s[0]-ms[-1][1] <= 0.5: ms[-1] = (ms[-1][0], s[1])
                  else: ms.append(s)
              with open(os.path.join(td,'c.txt'),'w') as f:
                  for i,(s,e) in enumerate(ms):
                      if e-s < 0.5: continue
                      sf = os.path.join(td, f's{i:03d}.mp4')
                      subprocess.run(['ffmpeg','-y','-i',inp,'-ss',str(s),'-to',str(e),'-c','copy','-loglevel','quiet',sf], capture_output=True)
                      if os.path.isfile(sf): f.write(f"file '{sf}'\n")
              ok = subprocess.run(['ffmpeg','-y','-f','concat','-safe','0','-i',os.path.join(td,'c.txt'),'-c','copy','-loglevel','quiet',out], capture_output=True).returncode==0
              shutil.rmtree(td, ignore_errors=True)
              return ok

          def compress(inp, out, mb=45):
              subprocess.run(['ffmpeg','-y','-i',inp,'-c:v','libx264','-preset','ultrafast','-crf','35','-c:a','aac','-b:a','48k','-fs',f'{mb}M','-loglevel','error',out], capture_output=True)
              return os.path.isfile(out)

          async def run_pipeline():
              print("\n📥 Downloading Subtitles via yt-dlp...")
              # استخدام الطريقة المجرّبة والناجحة لاستخراج ملف الترجمة بدقة
              sub_opts = {
                  'skip_download': True,
                  'writeautomaticsub': True,
                  'subtitleslangs': ['ar'],
                  'outtmpl': 'sub_file',
                  'cookiefile': COOKIES if os.path.exists(COOKIES) else None,
                  'quiet': True
              }
              try:
                  with yt_dlp.YoutubeDL(sub_opts) as ydl:
                      ydl.download([YT_URL])
              except Exception as e:
                  print(f"Subtitles download error: {e}")

              if not os.path.isfile(SUBS):
                  print("❌ Subtitle file not found!")
                  await tg_msg("❌ فشل استخراج ملف الترجمة من الفيديو")
                  sys.exit(1)

              # قراءة وتحليل ملف الـ VTT
              lines = []
              try:
                  for caption in webvtt.read(SUBS):
                      t_start = caption.start.split('.')[0]
                      clean_txt = " ".join([ln.strip() for ln in caption.text.split('\n') if ln.strip()])
                      clean_txt = re.sub(r'<[^>]*>', '', clean_txt)
                      if clean_txt:
                          lines.append(f"{t_start} | {clean_txt}")
              except Exception as e:
                  print(f"VTT Parsing Error: {e}")
                  sys.exit(1)

              final_lines = []
              last_line = ""
              for ln in lines:
                  if ln != last_line:
                      final_lines.append(ln)
                      last_line = ln

              transcript = '\n'.join(final_lines)
              print(f"✅ Got {len(final_lines)} lines of transcript")

              if not transcript.strip():
                  print("❌ Transcript is empty!")
                  await tg_msg("❌ نص الترجمة فارغ أو لم ينجح تنظيفه")
                  sys.exit(1)

              # ============== STEP 2: Gemini Analysis ==============
              print("\n🤖 Analyzing with Gemini...")
              prompt = f"""حلل النص واستخرج المواضيع الرئيسية مع أوقاتها:
              • HH:MM:SS | عنوان الموضوع

              النص:
              {transcript[:50000]}"""

              resp = requests.post(
                  f"https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key={GEMINI_KEY}",
                  json={"contents":[{"parts":[{"text":prompt}]}],"generationConfig":{"temperature":0.1,"maxOutputTokens":8192}},
                  timeout=300
              )

              if resp.status_code != 200:
                  print(f"❌ Gemini error: {resp.status_code}")
                  await tg_msg("❌ فشل تحليل الترجمة")
                  sys.exit(1)

              stamps_text = resp.json()['candidates'][0]['content']['parts'][0]['text']
              segments = re.findall(r'•\s*([\d:]+)\s*\|\s*(.+)', stamps_text)
              if not segments:
                  segments = re.findall(r'([\d:]{7,8})\s*\|\s*(.+)', stamps_text)

              print(f"\n✅ Found {len(segments)} segments")

              # ============== STEP 3: Download Video ==============
              print("\n📥 Downloading video...")
              await tg_msg(f"✅ تم تحليل {len(segments)} مقطع\n📥 جاري تحميل الفيديو...")

              v_opts = {'format': 'best[height<=720]', 'outtmpl': VIDEO, 'quiet': True,
                        'cookiefile': COOKIES if os.path.exists(COOKIES) else None, 'live_from_start': True}
              try:
                  with yt_dlp.YoutubeDL(v_opts) as ydl:
                      ydl.download([YT_URL])
              except:
                  v_opts['cookiefile'] = None
                  with yt_dlp.YoutubeDL(v_opts) as ydl:
                      ydl.download([YT_URL])

              if not os.path.isfile(VIDEO):
                  print("❌ Download failed!")
                  sys.exit(1)

              vsize = os.path.getsize(VIDEO)/1024/1024
              print(f"✅ Downloaded: {vsize:.1f} MB")

              # ============== STEP 4: Process & Send Clips ==============
              print(f"\n🎬 Processing {len(segments)} clips...")
              client = TelegramClient('s', API_ID, API_HASH)
              await client.start(bot_token=BOT_TOKEN)
              target = int(TG_TARGET)
              
              await client.send_message(target, f"🎬 بدء معالجة {len(segments)} مقطع...")
              
              sent, fail = 0, 0
              for idx, (ts, title) in enumerate(segments):
                  title = title.strip()
                  start_sec = t2s(ts)
                  end_sec = t2s(segments[idx+1][0]) if idx+1 < len(segments) else start_sec + 600
                  if end_sec <= start_sec: end_sec = start_sec + 300
                  
                  ss_str, es_str = ts, s2t(end_sec)
                  dur_min = (end_sec - start_sec) / 60
                  print(f"\n📹 {idx+1}/{len(segments)}: {title[:60]} ({dur_min:.1f}m)")
                  
                  td = tempfile.mkdtemp(dir=TMP)
                  try:
                      cp = os.path.join(td, 'c.mp4')
                      if not cut(ss_str, es_str, cp):
                          fail += 1
                          continue
                      
                      ip = os.path.join(td, 't.png')
                      mp = cp
                      thumbnail(title, ip)
                      mp2 = os.path.join(td, 'm.mp4')
                      if merge(cp, ip, mp2):
                          mp = mp2
                      
                      fp = os.path.join(td, 'f.mp4')
                      if silence(mp, fp):
                          pass
                      else:
                          fp = mp
                      
                      cap = f"**{title}**\n📌 {idx+1}/{len(segments)}\n⏱️ {ts}"
                      
                      try:
                          await client.send_file(target, fp, caption=cap, supports_streaming=True)
                          sent += 1
                      except Exception as e:
                          if 'too big' in str(e).lower():
                              comp = os.path.join(td, 'comp.mp4')
                              if compress(fp, comp):
                                  try:
                                      await client.send_file(target, comp, caption=cap+'\n(مضغوط)', supports_streaming=True)
                                      sent += 1
                                  except: fail += 1
                              else: fail += 1
                          else:
                              fail += 1
                      
                      if (idx+1) % 5 == 0:
                          await client.send_message(target, f"📊 {idx+1}/{len(segments)} | ✅{sent} ❌{fail}")
                      
                  finally:
                      shutil.rmtree(td, ignore_errors=True)
                  
                  await asyncio.sleep(2)
              
              await client.send_message(target, f"✅ **تم!**\n📊 {len(segments)} مقطع\n✅{sent} ❌{fail}")
              await client.disconnect()

          asyncio.run(run_pipeline())

          # تنظيف الملفات
          for f in [VIDEO, SUBS, COOKIES]:
              if os.path.isfile(f): os.remove(f)
          shutil.rmtree(TMP, ignore_errors=True)
          print("\n✅ All done!")
