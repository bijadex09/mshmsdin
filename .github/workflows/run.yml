          {transcript_data}"""

              api_url = f"https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key={GEMINI_KEY}"
              headers = {"Content-Type": "application/json"}
              payload = {"contents": [{"parts": [{"text": user_prompt}]}]}

              response = requests.post(api_url, headers=headers, json=payload, timeout=60)

              if response.status_code == 200:
                  res_json = response.json()
                  gemini_result = res_json['candidates'][0]['content']['parts'][0]['text'].strip()

                  print("\n✨ Gemini API Result:\n", gemini_result)

                  with open(os.path.join(BASE_DIR, "gemini_output.txt"), "w", encoding="utf-8") as out_f:
                      out_f.write(gemini_result)

                  tg_msg(f"📋 **نتائج استخراج الأسئلة من جيميناي:**\n\n{gemini_result}")
              else:
                  print(f"❌ Gemini API Error Status: {response.status_code}\nResponse: {response.text}")
                  tg_msg(f"❌ فشل طلب جيميناي. كود الخطأ: {response.status_code}")
                  sys.exit(1)

          except Exception as e:
              print(f"❌ Requests processing failed: {e}")
              tg_msg(f"❌ حدث خطأ أثناء إرسال الطلب: {e}")
              sys.exit(1)

          # استخراج المواقيت من رد جيميناي
          clips = []
          for line in gemini_result.strip().split('\n'):
              if '|' in line:
                  line = line.lstrip('• ').strip()
                  parts = line.split('|')
                  if len(parts) >= 3:
                      original_start = parts[0].strip()
                      original_end = parts[1].strip()
                      title = parts[2].strip()
                      
                      # تطبيق التعديلات على الوقت
                      new_start, new_end = adjust_timestamp(original_start, original_end, video_duration)
                      
                      clips.append({
                          'start': new_start, 
                          'end': new_end, 
                          'title': title,
                          'original_start': original_start,
                          'original_end': original_end
                      })
                      
                      print(f"  📍 Clip {len(clips)}: {original_start} → {original_end}  =>  {new_start} → {new_end} (+{abs(START_OFFSET)}s / +{END_OFFSET}s)")

          if not clips:
              tg_msg("⚠️ لم يتم العثور على مواقيت مقاطع صالحة للقص.")
              sys.exit(0)

          tg_msg(f"🚀 تم تأكيد مواقيت جيميناي وبدء عملية القص والإنتاج لـ ({len(clips)}) مقطع...")

          # معالجة كل مقطع
          for idx, clip in enumerate(clips, 1):
              print(f"\n🎬 Processing Clip {idx}/{len(clips)}: {clip['title']}")
              
              safe_name = "".join(c for c in clip['title'] if c.isalnum() or c == ' ' or c in '_-')
              safe_name = safe_name.replace(' ', '_')[:100]
              
              raw_clip = os.path.join(BASE_DIR, f"raw_{idx}.mp4")
              vad_clip = os.path.join(BASE_DIR, f"vad_{idx}.mp4")
              img_path = os.path.join(BASE_DIR, f"img_{idx}.png")
              output_path = os.path.join(BASE_DIR, f"{idx:02d}_{safe_name}.mp4")
              
              # قص المقطع (باستخدام التوقيتات المعدلة)
              print(f"  ✂️ Cutting: {clip['start']} → {clip['end']} (original: {clip['original_start']} → {clip['original_end']})")
              if not extract_clip(TEMP_VIDEO, clip['start'], clip['end'], raw_clip):
                  print(f"  ❌ Failed to cut clip")
                  continue
              
              # إزالة الصمت
              print(f"  🔇 Removing silence...")
              success, removed = remove_silence_from_video(raw_clip, vad_clip)
              if not success:
                  print(f"  ⚠️ Silence removal failed, using original")
                  shutil.copy2(raw_clip, vad_clip)
              elif removed > 0:
                  print(f"  ✅ Removed {seconds_to_time(removed)} of silence")
              
              # إنشاء الصورة
              print(f"  🖼️ Creating image...")
              if not create_image_with_title(clip['title'], img_path):
                  print(f"  ❌ Failed to create image")
                  continue
              
              # دمج الفيديو مع الصورة
              print(f"  🎬 Merging video with image...")
              if process_tiktok_reel(vad_clip, img_path, output_path) and os.path.exists(output_path):
                  size_mb = os.path.getsize(output_path) / (1024 * 1024)
                  print(f"  ✅ Merged successfully ({size_mb:.1f}MB)")
                  
                  # إرسال إلى تليجرام (مع عرض التوقيتات الأصلية والمعدلة)
                  caption_text = f"🎥 {clip['title']}\n\n⏱ التوقيت الأصلي: {clip['original_start']} 👈 {clip['original_end']}\n📌 التوقيت المعدل: {clip['start']} 👈 {clip['end']}"
                  tg_send_video(output_path, caption_text)
              else:
                  print(f"  ❌ Failed to merge")
              
              # تنظيف الملفات المؤقتة
              for temp_file in [raw_clip, vad_clip, img_path, output_path]:
                  if os.path.exists(temp_file):
                      try:
                          os.remove(temp_file)
                      except:
                          pass

          if os.path.exists(TEMP_VIDEO):
              os.remove(TEMP_VIDEO)
          
          tg_msg("🏁 اكتملت الدورة البرمجية المؤتمتة بالكامل! تم إنتاج ورفع جميع المقاطع بنجاح.")
