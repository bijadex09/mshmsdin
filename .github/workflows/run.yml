name: YouTube Ultimate QA Extractor - Every 3 Days

on:
  schedule:
    - cron: '0 0 */3 * *'
  workflow_dispatch:
    inputs:
      telegram_target:
        description: 'Telegram Channel/User ID'
        required: true
        default: '-1004447957881'

jobs:
  process-single-video:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup System Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg fontconfig build-essential python3-dev
          npm install -g sharp-cli
          pip install yt-dlp requests webrtcvad-wheels telethon google-auth google-auth-oauthlib google-auth-httplib2 google-api-python-client
          pip install --upgrade pip
          pip install --upgrade yt-dlp

      - name: Process Single Video
        env:
          TG_TARGET: ${{ github.event.inputs.telegram_target }}
          COOKIES_TEXT: ${{ secrets.COOKIES_TEXT }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_NAME: ${{ github.repository }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        shell: python
        run: |
          import os
          import sys
          import wave
          import shutil
          import tempfile
          import subprocess
          import requests
          import json
          import urllib.request
          import re
          import asyncio
          import datetime
          import base64
          import time
          from typing import List, Tuple
          from telethon import TelegramClient
          from googleapiclient.discovery import build
          from googleapiclient.http import MediaFileUpload
          from google.auth.transport.requests import Request as AuthRequest
          from google.oauth2.credentials import Credentials

          # ========== الإعدادات ==========
          BOT_TOKEN = "8248329215:AAGl3C96vZQ0B9VuDTX2m7IQt--WHDXJmFI"
          TELEGRAM_API_ID = 24629594
          TELEGRAM_API_HASH = "a79fa760e65af09a85eb2cc97cb2263c"
          TELEGRAM_BOT_TOKEN = "8853762125:AAEJeYtDufaLoQcq8ZbuHpuQ3R42WYJkBXo"
          
          TG_TARGET = os.environ.get('TG_TARGET', '')
          COOKIES_TEXT = os.environ.get('COOKIES_TEXT', '')
          GEMINI_KEY = os.environ.get('GEMINI_API_KEY', '')
          GITHUB_TOKEN = os.environ.get('GITHUB_TOKEN')
          REPO_NAME = os.environ.get('REPO_NAME')
          
          YOUTUBE_CLIENT_ID = os.environ.get('YOUTUBE_CLIENT_ID', '')
          YOUTUBE_CLIENT_SECRET = os.environ.get('YOUTUBE_CLIENT_SECRET', '')
          YOUTUBE_REFRESH_TOKEN = os.environ.get('YOUTUBE_REFRESH_TOKEN', '')
          
          VIDEOS_FILE_PATH = "videos.txt"
          LAST_PUBLISH_FILE = "last_publish.json"
          BASE_DIR = os.getcwd()
          TEMP_VIDEO = os.path.join(BASE_DIR, "temp_video.mp4")
          COOKIES_FILE = os.path.join(BASE_DIR, "cookies.txt")
          SUB_OUTPUT = os.path.join(BASE_DIR, "sub_file")
          EXPECTED_VTT = os.path.join(BASE_DIR, "sub_file.ar.vtt")
          FINAL_TRANSCRIPT = os.path.join(BASE_DIR, "transcript.txt")

          # أوقات النشر (بالتوقيت العالمي UTC)
          PUBLISH_HOURS = [11, 14, 17, 20, 22]

          # الحد الأقصى لمدة المقطع (3 دقائق)
          MAX_CLIP_DURATION = 180

          # إعدادات الصور والخطوط
          FONT_SYSTEM_DIR = os.path.expanduser("~/.local/share/fonts")
          IMAGES_CACHE_DIR = os.path.expanduser("~/.local/share/images")
          FONT_FULL_PATH = os.path.join(FONT_SYSTEM_DIR, "ReadexPro-Bold.ttf")
          BACKGROUND_SHORT_URL = "https://raw.githubusercontent.com/bidjadraft/markdown/refs/heads/main/images/background1.png"
          BACKGROUND_LONG_URL = "https://raw.githubusercontent.com/bidjadraft/markdown/refs/heads/main/images/background.png"
          FONT_URL = "https://raw.githubusercontent.com/bidjadraft/markdown/refs/heads/main/fonts/ReadexPro-Bold.ttf"
          
          os.makedirs(IMAGES_CACHE_DIR, exist_ok=True)
          os.makedirs(FONT_SYSTEM_DIR, exist_ok=True)
          CACHED_FONT = os.path.join(IMAGES_CACHE_DIR, "ReadexPro-Bold.ttf")
          CACHED_BG_SHORT = os.path.join(IMAGES_CACHE_DIR, "background1.png")
          CACHED_BG_LONG = os.path.join(IMAGES_CACHE_DIR, "background.png")

          # إعدادات المعالجة
          AUDIO_BITRATE = "96k"
          VIDEO_PRESET = "faster"
          VIDEO_CRF = 20
          SILENCE_THRESHOLD = 0.5
          VAD_AGGRESSIVENESS = 3
          START_OFFSET = -3
          END_OFFSET = 5
          TELEGRAM_LIMIT = 20 * 1024 * 1024

          # ========== دوال حفظ آخر وقت نشر ==========
          def load_last_publish():
              if os.path.exists(LAST_PUBLISH_FILE):
                  try:
                      with open(LAST_PUBLISH_FILE, 'r', encoding='utf-8') as f:
                          data = json.load(f)
                          return data.get("last_publish_time")
                  except:
                      pass
              return None

          def save_last_publish(publish_time_str):
              data = {
                  "last_publish_time": publish_time_str,
                  "last_updated": datetime.datetime.now(datetime.timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ")
              }
              with open(LAST_PUBLISH_FILE, 'w', encoding='utf-8') as f:
                  json.dump(data, f, indent=2, ensure_ascii=False)
              upload_last_publish_to_github()

          def upload_last_publish_to_github():
              if not GITHUB_TOKEN or not REPO_NAME:
                  return
              
              url = f"https://api.github.com/repos/{REPO_NAME}/contents/{LAST_PUBLISH_FILE}"
              headers = {
                  "Authorization": f"Bearer {GITHUB_TOKEN}",
                  "Accept": "application/vnd.github.v3+json"
              }
              
              with open(LAST_PUBLISH_FILE, 'r', encoding='utf-8') as f:
                  content = f.read()
              
              response = requests.get(url, headers=headers)
              current_sha = None
              if response.status_code == 200:
                  current_sha = response.json().get('sha')
              
              data = {
                  "message": "Update last publish time",
                  "content": base64.b64encode(content.encode()).decode()
              }
              if current_sha:
                  data["sha"] = current_sha
              
              try:
                  requests.put(url, headers=headers, json=data)
                  print(f"✅ Last publish time saved to GitHub")
              except Exception as e:
                  print(f"⚠️ Failed to upload: {e}")

          def get_next_publish_time():
              last_publish = load_last_publish()
              now = datetime.datetime.now(datetime.timezone.utc)
              
              if last_publish:
                  last_time = datetime.datetime.strptime(last_publish, "%Y-%m-%dT%H:%M:%SZ").replace(tzinfo=datetime.timezone.utc)
                  last_hour = last_time.hour
                  last_date = last_time.date()
                  
                  try:
                      current_index = PUBLISH_HOURS.index(last_hour)
                      next_index = current_index + 1
                  except ValueError:
                      next_index = 0
                  
                  if next_index >= len(PUBLISH_HOURS):
                      next_date = last_date + datetime.timedelta(days=1)
                      next_hour = PUBLISH_HOURS[0]
                  else:
                      next_date = last_date
                      next_hour = PUBLISH_HOURS[next_index]
                  
                  publish_time = datetime.datetime.combine(next_date, datetime.time(next_hour, 0, tzinfo=datetime.timezone.utc))
                  
                  while publish_time <= now:
                      try:
                          current_index = PUBLISH_HOURS.index(publish_time.hour)
                          next_index = current_index + 1
                      except ValueError:
                          next_index = 0
                      
                      if next_index >= len(PUBLISH_HOURS):
                          publish_time = datetime.datetime.combine(publish_time.date() + datetime.timedelta(days=1), datetime.time(PUBLISH_HOURS[0], 0, tzinfo=datetime.timezone.utc))
                      else:
                          publish_time = datetime.datetime.combine(publish_time.date(), datetime.time(PUBLISH_HOURS[next_index], 0, tzinfo=datetime.timezone.utc))
                  
              else:
                  now_hour = now.hour
                  now_date = now.date()
                  
                  next_hour = None
                  for hour in PUBLISH_HOURS:
                      if hour > now_hour:
                          next_hour = hour
                          break
                  
                  if next_hour is None:
                      next_date = now_date + datetime.timedelta(days=1)
                      next_hour = PUBLISH_HOURS[0]
                  else:
                      next_date = now_date
                  
                  publish_time = datetime.datetime.combine(next_date, datetime.time(next_hour, 0, tzinfo=datetime.timezone.utc))
              
              return publish_time

          def update_last_publish(publish_time):
              save_last_publish(publish_time.strftime("%Y-%m-%dT%H:%M:%SZ"))
              algiers_time = publish_time + datetime.timedelta(hours=1)
              print(f"✅ Updated last publish time to: {algiers_time.strftime('%H:%M')} (توقيت الجزائر)")

          # ========== دوال GitHub API ==========
          def get_github_headers():
              return {
                  "Authorization": f"Bearer {GITHUB_TOKEN}",
                  "Accept": "application/vnd.github.v3+json"
              }

          def get_first_url():
              url = f"https://api.github.com/repos/{REPO_NAME}/contents/{VIDEOS_FILE_PATH}"
              headers = get_github_headers()
              
              try:
                  response = requests.get(url, headers=headers)
                  if response.status_code == 200:
                      data = response.json()
                      content = base64.b64decode(data['content']).decode('utf-8')
                      urls = [line.strip() for line in content.splitlines() if line.strip()]
                      if urls:
                          print(f"✅ First URL: {urls[0]}")
                          print(f"📊 Total URLs remaining: {len(urls)}")
                          return urls[0], urls[1:], data['sha']
                      else:
                          print("✅ No URLs found in videos.txt")
                          return None, [], None
                  else:
                      print(f"❌ Failed to read videos.txt: {response.status_code}")
                      return None, [], None
              except Exception as e:
                  print(f"❌ Error: {e}")
                  return None, [], None

          def update_videos_file(remaining_urls, current_sha):
              if not current_sha:
                  return False
              
              url = f"https://api.github.com/repos/{REPO_NAME}/contents/{VIDEOS_FILE_PATH}"
              headers = get_github_headers()
              
              new_content = "\n".join(remaining_urls)
              if new_content and not new_content.endswith('\n'):
                  new_content += '\n'
              
              data = {
                  "message": f"Remove processed video. Remaining: {len(remaining_urls)}",
                  "content": base64.b64encode(new_content.encode()).decode(),
                  "sha": current_sha
              }
              
              try:
                  response = requests.put(url, headers=headers, json=data)
                  if response.status_code == 200:
                      print(f"✅ Removed URL from videos.txt. Remaining: {len(remaining_urls)}")
                      return True
                  else:
                      print(f"❌ Failed to update: {response.status_code}")
                      return False
              except Exception as e:
                  print(f"❌ Error: {e}")
                  return False

          # ========== دوال التحميل الأساسية ==========
          def download_file(url, dest):
              if os.path.exists(dest): return True
              try: urllib.request.urlretrieve(url, dest); return True
              except: return False

          try:
              download_file(FONT_URL, CACHED_FONT)
              download_file(BACKGROUND_SHORT_URL, CACHED_BG_SHORT)
              download_file(BACKGROUND_LONG_URL, CACHED_BG_LONG)
              if not os.path.exists(FONT_FULL_PATH):
                  shutil.copy2(CACHED_FONT, FONT_FULL_PATH)
                  subprocess.run(['fc-cache', '-fv'], capture_output=True)
          except Exception as e: print(f"⚠️ Assets warning: {e}")

          def get_duration(file_path: str) -> float:
              try:
                  cmd = ['ffprobe', '-v', 'error', '-show_entries', 'format=duration', '-of', 'default=noprint_wrappers=1:nokey=1', file_path]
                  result = subprocess.run(cmd, capture_output=True, text=True)
                  return float(result.stdout.strip()) if result.stdout.strip() else 0.0
              except: return 0.0

          def run_cmd(cmd):
              try:
                  result = subprocess.run(cmd, capture_output=True, text=True)
                  return result.returncode == 0
              except: return False

          def seconds_to_time(seconds: float) -> str:
              minutes = int(seconds // 60); secs = int(seconds % 60)
              if minutes >= 60: hours = minutes // 60; minutes = minutes % 60; return f"{hours:02d}:{minutes:02d}:{secs:02d}"
              return f"{minutes:02d}:{secs:02d}"

          # ========== دالة تحويل الوقت المعدلة ==========
          def time_to_seconds(time_str: str) -> float:
              """تحويل تنسيق الوقت إلى ثواني (يدعم MM:SS, MM:SS.mmm, HH:MM:SS, HH:MM:SS.mmm)"""
              time_str = time_str.strip()
              
              # فصل الأجزاء العشرية إذا وجدت
              if '.' in time_str:
                  main_part, _ = time_str.split('.')
              else:
                  main_part = time_str
              
              parts = main_part.split(':')
              if len(parts) == 2:  # MM:SS
                  minutes = int(parts[0])
                  seconds = int(parts[1])
                  return minutes * 60 + seconds
              elif len(parts) == 3:  # HH:MM:SS
                  hours = int(parts[0])
                  minutes = int(parts[1])
                  seconds = int(parts[2])
                  return hours * 3600 + minutes * 60 + seconds
              else:
                  print(f"⚠️ Warning: Unknown time format: {time_str}")
                  return 0.0

          def adjust_timestamp(start_time: str, end_time: str, video_duration: float) -> Tuple[str, str]:
              start_sec = max(0, time_to_seconds(start_time) + START_OFFSET)
              end_sec = min(video_duration, time_to_seconds(end_time) + END_OFFSET)
              if end_sec <= start_sec: end_sec = start_sec + 1
              return seconds_to_time(start_sec), seconds_to_time(end_sec)

          def extract_clip(video_path: str, start: str, end: str, output_path: str) -> bool:
              return run_cmd(['ffmpeg', '-y', '-i', video_path, '-ss', start, '-to', end, '-c:v', 'libx264', '-preset', VIDEO_PRESET, '-crf', str(VIDEO_CRF), '-c:a', 'aac', '-b:a', AUDIO_BITRATE, '-loglevel', 'error', output_path])

          def remove_silence_from_video(input_path: str, output_path: str) -> Tuple[bool, float]:
              try:
                  import webrtcvad
                  vad = webrtcvad.Vad(VAD_AGGRESSIVENESS)
              except ImportError:
                  shutil.copy2(input_path, output_path); return True, 0.0
              
              orig_duration = get_duration(input_path)
              with tempfile.TemporaryDirectory() as temp_dir:
                  temp_audio = os.path.join(temp_dir, "audio.wav")
                  if not run_cmd(['ffmpeg', '-y', '-i', input_path, '-ar', '16000', '-ac', '1', temp_audio, '-loglevel', 'quiet']): return False, 0.0
                  
                  with wave.open(temp_audio, 'rb') as wav:
                      rate = wav.getframerate()
                      frames = wav.readframes(wav.getnframes())
                  
                  frame_size = int(rate * 30 / 1000) * 2
                  segments = []
                  speech = False
                  start_speech = 0.0
                  
                  for i in range(0, len(frames) - frame_size, frame_size):
                      try:
                          is_speech = vad.is_speech(frames[i:i+frame_size], rate)
                          current_time = i / (rate * 2)
                          if is_speech and not speech:
                              speech = True
                              start_speech = max(0, current_time - 0.2)
                          elif not is_speech and speech:
                              speech = False
                              segments.append((start_speech, current_time + 0.2))
                      except: continue
                  
                  if speech: segments.append((start_speech, len(frames) / (rate * 2)))
                  if not segments: return False, 0.0
                  
                  merged = []
                  cs, ce = segments[0]
                  for ns, ne in segments[1:]:
                      if ns - ce <= 0.5: ce = max(ce, ne)
                      else: merged.append((cs, ce)); cs, ce = ns, ne
                  merged.append((cs, ce))
                  
                  segment_files = []
                  for s, e in merged:
                      if e - s < 0.5: continue
                      seg_file = os.path.join(temp_dir, f"seg_{len(segment_files):03d}.mp4")
                      if run_cmd(['ffmpeg', '-y', '-ss', f"{s:.3f}", '-i', input_path, '-t', f"{e-s:.3f}", '-c:v', 'libx264', '-preset', VIDEO_PRESET, '-crf', str(VIDEO_CRF), '-c:a', 'aac', '-b:a', AUDIO_BITRATE, seg_file, '-loglevel', 'quiet']):
                          segment_files.append(seg_file)
                  
                  if not segment_files: return False, 0.0
                  
                  concat_file = os.path.join(temp_dir, "concat.txt")
                  with open(concat_file, 'w') as f:
                      for seg in segment_files: f.write(f"file '{seg}'\n")
                  
                  if run_cmd(['ffmpeg', '-y', '-f', 'concat', '-safe', '0', '-i', concat_file, '-c', 'copy', output_path, '-loglevel', 'quiet']):
                      return True, orig_duration - get_duration(output_path)
              return False, 0.0

          # ========== دوال إنشاء الصور ==========
          def truncate_title(title, max_words=10):
              words = title.strip().split()
              if len(words) > max_words:
                  truncated = ' '.join(words[:max_words])
                  print(f"⚠️ Title truncated from {len(words)} to {max_words} words: {truncated}")
                  return truncated
              return title

          def get_single_line_font_size(word_count):
              if word_count <= 3: return 90
              elif word_count == 4: return 80
              elif word_count == 5: return 68
              elif word_count <= 7: return 60
              elif word_count <= 10: return 52
              else: return 48

          def split_text_to_two_lines(text):
              words = text.strip().split()
              half = (len(words) + 1) // 2
              return [" ".join(words[:half]), " ".join(words[half:])]

          def create_image_with_title(text, output_path):
              text = truncate_title(text, max_words=10)
              word_count = len(text.strip().split())
              
              if word_count >= 7:
                  bg_image = CACHED_BG_LONG
                  font_size = 70
                  use_multiline = True
              else:
                  bg_image = CACHED_BG_SHORT
                  font_size = get_single_line_font_size(word_count)
                  use_multiline = False
              
              if not os.path.exists(bg_image):
                  fallback_bg = os.path.join(IMAGES_CACHE_DIR, "fallback_bg.png")
                  if not os.path.exists(fallback_bg):
                      subprocess.run(['ffmpeg', '-y', '-f', 'lavfi', '-i', 'color=c=black:s=1080x1920:d=1', '-frames:v', '1', fallback_bg], capture_output=True)
                  bg_to_use = fallback_bg
              else:
                  bg_to_use = bg_image
              
              if not use_multiline:
                  svg = f'''<?xml version="1.0" encoding="UTF-8"?>
          <svg width="1080" height="1920" xmlns="http://www.w3.org/2000/svg">
              <defs>
                  <style>
                      @font-face {{
                          font-family: 'Readex Pro';
                          src: url('{FONT_FULL_PATH}');
                      }}
                      .title {{
                          fill: white;
                          font-family: 'Readex Pro', sans-serif;
                          font-size: {font_size}px;
                          font-weight: bold;
                          text-anchor: middle;
                          filter: drop-shadow(0px 2px 4px rgba(0,0,0,0.5));
                      }}
                  </style>
              </defs>
              <text x="540" y="1390" class="title" direction="rtl">{text}</text>
          </svg>'''
              else:
                  lines = split_text_to_two_lines(text)
                  svg = f'''<?xml version="1.0" encoding="UTF-8"?>
          <svg width="1080" height="1920" xmlns="http://www.w3.org/2000/svg">
              <defs>
                  <style>
                      @font-face {{
                          font-family: 'Readex Pro';
                          src: url('{FONT_FULL_PATH}');
                      }}
                      .title {{
                          fill: white;
                          font-family: 'Readex Pro', sans-serif;
                          font-size: {font_size}px;
                          font-weight: bold;
                          text-anchor: middle;
                          filter: drop-shadow(0px 2px 4px rgba(0,0,0,0.5));
                      }}
                  </style>
              </defs>
              <text x="540" y="1390" class="title" direction="rtl">{lines[0]}</text>
              <text x="540" y="1500" class="title" direction="rtl">{lines[1]}</text>
          </svg>'''
              
              temp_svg = os.path.join(IMAGES_CACHE_DIR, "text_layer.svg")
              with open(temp_svg, "w", encoding="utf-8") as f: f.write(svg)
              
              try:
                  subprocess.run(['sharp', 'composite', temp_svg, '--input', bg_to_use, '--output', output_path], check=True, capture_output=True)
              except:
                  temp_text_png = os.path.join(IMAGES_CACHE_DIR, "temp_text.png")
                  try:
                      subprocess.run(['sharp', '-i', temp_svg, '-o', temp_text_png, '--density', '300'], capture_output=True)
                      subprocess.run(['ffmpeg', '-y', '-i', bg_to_use, '-i', temp_text_png, '-filter_complex', 'overlay=0:0', '-frames:v', '1', output_path], capture_output=True)
                  except:
                      return False
                  finally:
                      if os.path.exists(temp_text_png):
                          os.remove(temp_text_png)
              
              if os.path.exists(temp_svg):
                  os.remove(temp_svg)
              
              return os.path.exists(output_path)

          # ========== دالة دمج الفيديو مع الصورة ==========
          def process_tiktok_reel(video_path, image_path, output_path):
              filter_complex = (
                  "[0:v]loop=loop=-1:size=1:start=0,setpts=PTS-STARTPTS,scale=trunc(iw/2)*2:trunc(ih/2)*2[bg]; "
                  "[1:v]setpts=PTS-STARTPTS,crop=ih*4/5:ih:(iw-ow)/2:0,scale=820:1026[v_final]; "
                  "[bg][v_final]overlay=(W-w)/2:150:shortest=1"
              )
              
              cmd = [
                  "ffmpeg", "-y",
                  "-i", image_path,
                  "-i", video_path,
                  "-filter_complex", filter_complex,
                  "-pix_fmt", "yuv420p",
                  "-c:v", "libx264",
                  "-c:a", "aac", "-b:a", AUDIO_BITRATE,
                  "-shortest",
                  output_path
              ]
              
              return run_cmd(cmd)

          # ========== دوال الإرسال ==========
          def tg_send_video_requests(filepath, caption):
              caption = truncate_title(caption, max_words=10)
              try:
                  url = f"https://api.telegram.org/bot{BOT_TOKEN}/sendVideo"
                  with open(filepath, 'rb') as video:
                      response = requests.post(url, data={'chat_id': int(TG_TARGET), 'caption': caption, 'supports_streaming': True}, files={'video': video}, timeout=120)
                      return response.status_code == 200
              except: return False

          async def tg_send_video_telethon(filepath, caption):
              caption = truncate_title(caption, max_words=10)
              try:
                  client = TelegramClient('session', TELEGRAM_API_ID, TELEGRAM_API_HASH)
                  await client.start(bot_token=TELEGRAM_BOT_TOKEN)
                  await client.send_file(int(TG_TARGET), filepath, caption=caption, supports_streaming=True)
                  await client.disconnect()
                  return True
              except: return False

          def send_video(filepath, caption):
              if os.path.getsize(filepath) > TELEGRAM_LIMIT:
                  return asyncio.run(tg_send_video_telethon(filepath, caption))
              return tg_send_video_requests(filepath, caption)

          # ========== دوال YouTube ==========
          def get_youtube_service():
              if not all([YOUTUBE_CLIENT_ID, YOUTUBE_CLIENT_SECRET, YOUTUBE_REFRESH_TOKEN]):
                  print("⚠️ YouTube credentials missing")
                  return None
              
              creds = Credentials(
                  token=None,
                  refresh_token=YOUTUBE_REFRESH_TOKEN,
                  token_uri="https://oauth2.googleapis.com/token",
                  client_id=YOUTUBE_CLIENT_ID,
                  client_secret=YOUTUBE_CLIENT_SECRET,
                  scopes=['https://www.googleapis.com/auth/youtube.upload']
              )
              
              if creds.expired:
                  creds.refresh(AuthRequest())
              
              return build('youtube', 'v3', credentials=creds)

          def upload_to_youtube(video_path, title, publish_time):
              youtube = get_youtube_service()
              if not youtube: return None
              
              title = truncate_title(title, max_words=10)
              
              try:
                  body = {
                      'snippet': {
                          'title': f"{title} #محمد_بن_شمس_الدين",
                          'description': f"{title}\n\n#محمد_بن_شمس_الدين",
                          'categoryId': '22'
                      },
                      'status': {
                          'privacyStatus': 'private',
                          'publishAt': publish_time.strftime("%Y-%m-%dT%H:%M:%SZ"),
                          'selfDeclaredMadeForKids': False
                      }
                  }
                  
                  media = MediaFileUpload(video_path, chunksize=-1, resumable=True)
                  request = youtube.videos().insert(part='snippet,status', body=body, media_body=media)
                  response = request.execute()
                  
                  if response and response.get('id'):
                      algiers_time = publish_time + datetime.timedelta(hours=1)
                      print(f"✅ YouTube scheduled! Video ID: {response['id']} at {algiers_time.strftime('%H:%M')} (توقيت الجزائر)")
                      return response['id']
              except Exception as e:
                  print(f"❌ YouTube error: {e}")
              return None

          # ========== دوال Gemini ==========
          def send_to_gemini(text, max_retries=5):
              """إرسال النص الكامل إلى Gemini مع إعادة المحاولة"""
              api_url = f"https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key={GEMINI_KEY}"
              headers = {"Content-Type": "application/json"}
              
              user_prompt = f"""الوثيقة هي نص تفريغ فيديو عربي لجلسة أسئلة وأجوبة دينية.

          استخرج جميع الأسئلة والإجابات في هذا النص كاملاً بهذا التنسيق:
          • START_TIME | END_TIME | عنوان السؤال (حد أقصى 10 كلمات)

          استخدم تنسيق MM:SS للأوقات.
          ابدأ الإخراج مباشرة بدون أي مقدمة.
          تأكد من استخراج كل الأسئلة الموجودة في النص.

          النص:
          {text}"""
              
              payload = {"contents": [{"parts": [{"text": user_prompt}]}]}
              
              for attempt in range(max_retries):
                  try:
                      print(f"📡 Sending to Gemini (attempt {attempt + 1}/{max_retries})...")
                      print(f"⏱️ Waiting up to 5 minutes for response...")
                      response = requests.post(api_url, headers=headers, json=payload, timeout=300)
                      
                      if response.status_code == 200:
                          res_json = response.json()
                          result = res_json['candidates'][0]['content']['parts'][0]['text'].strip()
                          print(f"✅ Gemini response received successfully")
                          return result
                      else:
                          print(f"⚠️ Gemini error {response.status_code}, retrying in 10 seconds...")
                          time.sleep(10)
                  except requests.exceptions.Timeout:
                      print(f"⚠️ Timeout on attempt {attempt + 1}, retrying in 15 seconds...")
                      time.sleep(15)
                  except Exception as e:
                      print(f"⚠️ Error: {e}, retrying in 10 seconds...")
                      time.sleep(10)
              
              print("❌ Gemini failed after all retries")
              return None

          # ========== المعالجة الرئيسية ==========
          def process_video(youtube_url):
              print(f"\n{'='*60}\nProcessing: {youtube_url}\n{'='*60}")
              
              # 1. إنشاء ملف الكوكيز
              with open(COOKIES_FILE, "w", encoding="utf-8") as f:
                  f.write(COOKIES_TEXT)
              
              # 2. تحميل الفيديو
              print("📥 Downloading video...")
              command = [
                  "yt-dlp", "--cookies", COOKIES_FILE, "--js-runtime", "node",
                  "--remote-components", "ejs:github", "-f", "bestvideo+bestaudio/best",
                  "--merge-output-format", "mp4", "-o", TEMP_VIDEO, youtube_url
              ]
              
              result = subprocess.run(command, capture_output=True, text=True)
              if result.returncode != 0 or not os.path.exists(TEMP_VIDEO):
                  print("❌ Download failed!")
                  if os.path.exists(COOKIES_FILE): os.remove(COOKIES_FILE)
                  return False
              
              video_duration = get_duration(TEMP_VIDEO)
              print(f"📹 Video duration: {seconds_to_time(video_duration)}")
              
              # 3. استخراج الترجمة
              print("📜 Extracting transcript...")
              srt_command = [
                  "yt-dlp", "--cookies", COOKIES_FILE, "--js-runtime", "node",
                  "--remote-components", "ejs:github", "--skip-download",
                  "--write-auto-sub", "--sub-lang", "ar", "--output", SUB_OUTPUT, youtube_url
              ]
              
              transcript_exists = False
              try:
                  subprocess.run(srt_command, capture_output=True, text=True)
                  if os.path.exists(EXPECTED_VTT):
                      with open(EXPECTED_VTT, "r", encoding="utf-8") as vtt_f:
                          vtt_content = vtt_f.read()
                      
                      lines = []
                      for line in vtt_content.split('\n'):
                          line = line.strip()
                          if line and not line.startswith('WEBVTT') and not line.startswith('Kind:') and not line.startswith('Language:') and '-->' not in line:
                              if not lines or lines[-1] != line:
                                  lines.append(line)
                      
                      with open(FINAL_TRANSCRIPT, "w", encoding="utf-8") as f:
                          f.write('\n'.join(lines))
                      transcript_exists = True
              except Exception as e:
                  print(f"❌ VTT Extraction failed: {e}")
              
              if os.path.exists(COOKIES_FILE):
                  os.remove(COOKIES_FILE)
              
              if not transcript_exists:
                  print("❌ Transcript not found!")
                  return False
              
              # 4. Gemini AI
              if not GEMINI_KEY:
                  print("❌ GEMINI_API_KEY missing!")
                  return False
              
              print("🤖 Sending full transcript to Gemini (this may take up to 5 minutes)...")
              
              with open(FINAL_TRANSCRIPT, "r", encoding="utf-8") as f:
                  transcript_data = f.read()
              
              print(f"📄 Transcript length: {len(transcript_data)} characters")
              print(f"⏱️ Processing may take a few minutes. Please wait...")
              
              gemini_result = send_to_gemini(transcript_data, max_retries=5)
              
              if not gemini_result:
                  print("❌ Gemini failed after 5 retries")
                  return False
              
              print("✨ Gemini analysis complete.")
              
              # 5. استخراج المقاطع من النتيجة مع التحقق من الصحة
              clips = []
              invalid_count = 0
              for line in gemini_result.strip().split('\n'):
                  if '|' in line:
                      line = line.lstrip('• ').strip()
                      parts = line.split('|')
                      if len(parts) >= 3:
                          original_start = parts[0].strip()
                          original_end = parts[1].strip()
                          title = parts[2].strip()
                          
                          # تحويل إلى ثواني للتحقق
                          start_sec = time_to_seconds(original_start)
                          end_sec = time_to_seconds(original_end)
                          
                          # التحقق من صحة التوقيتات
                          if start_sec == 0 and end_sec == 0:
                              print(f"  ⚠️ Skipping invalid time format: {original_start}→{original_end}")
                              invalid_count += 1
                              continue
                          
                          if end_sec <= start_sec:
                              print(f"  ⚠️ Skipping clip where end <= start: {original_start}→{original_end}")
                              invalid_count += 1
                              continue
                          
                          # التحقق من أن المدة معقولة (أكثر من 5 ثوانٍ وأقل من 10 دقائق)
                          duration = end_sec - start_sec
                          if duration < 5:
                              print(f"  ⚠️ Skipping too short clip ({duration:.0f}s): {original_start}→{original_end}")
                              invalid_count += 1
                              continue
                          
                          if duration > 600:  # 10 دقائق كحد أقصى
                              print(f"  ⚠️ Skipping too long clip ({duration:.0f}s): {original_start}→{original_end}")
                              invalid_count += 1
                              continue
                          
                          clips.append({
                              'start': original_start,
                              'end': original_end,
                              'title': title
                          })
                          print(f"  📍 Found valid clip: {original_start}→{original_end} ({duration:.0f}s) - {title}")
              
              if invalid_count > 0:
                  print(f"⚠️ Skipped {invalid_count} invalid clips")
              
              if not clips:
                  print("⚠️ No valid clips extracted from transcript")
                  return False
              
              print(f"✨ Gemini extracted {len(clips)} valid clips from full transcript")
              
              # 6. تعديل التوقيتات وتصفية المقاطع حسب الحد الأقصى للمدة
              valid_clips = []
              skipped_count = 0
              
              for clip in clips:
                  original_start = clip['start']
                  original_end = clip['end']
                  title = clip['title']
                  
                  new_start, new_end = adjust_timestamp(original_start, original_end, video_duration)
                  
                  start_sec = time_to_seconds(new_start)
                  end_sec = time_to_seconds(new_end)
                  duration_sec = end_sec - start_sec
                  
                  if duration_sec > MAX_CLIP_DURATION:
                      print(f"  ⏭️ Skipping clip (duration {duration_sec:.0f}s > {MAX_CLIP_DURATION}s): {title}")
                      skipped_count += 1
                      continue
                  
                  valid_clips.append({
                      'start': new_start, 
                      'end': new_end, 
                      'title': title, 
                      'duration': duration_sec,
                      'original_start': original_start,
                      'original_end': original_end
                  })
                  print(f"  📍 Adjusted clip: {original_start}→{original_end} => {new_start}→{new_end} ({duration_sec:.0f}s)")
              
              if skipped_count > 0:
                  print(f"⚠️ Skipped {skipped_count} clip(s) because they exceeded {MAX_CLIP_DURATION}s limit")
              
              if not valid_clips:
                  print("⚠️ No valid clips found after filtering")
                  return False
              
              # 7. معالجة المقاطع ورفعها مباشرة
              print(f"🚀 Starting processing for {len(valid_clips)} clips...")
              
              for idx, clip in enumerate(valid_clips, 1):
                  print(f"\n🎬 Processing Clip {idx}/{len(valid_clips)}: {clip['title']} ({clip['duration']:.0f}s)")
                  
                  publish_time = get_next_publish_time()
                  algiers_time = publish_time + datetime.timedelta(hours=1)
                  print(f"  📅 Scheduled for: {algiers_time.strftime('%H:%M')} (توقيت الجزائر)")
                  
                  safe_name = "".join(c for c in clip['title'] if c.isalnum() or c == ' ').replace(' ', '_')[:100]
                  raw_clip = f"raw_{idx}.mp4"
                  vad_clip = f"vad_{idx}.mp4"
                  img_path = f"img_{idx}.png"
                  output_path = f"{idx:02d}_{safe_name}.mp4"
                  
                  if not extract_clip(TEMP_VIDEO, clip['start'], clip['end'], raw_clip):
                      print("  ❌ Cut failed")
                      continue
                  
                  remove_silence_from_video(raw_clip, vad_clip)
                  
                  if not create_image_with_title(clip['title'], img_path):
                      print("  ❌ Image creation failed")
                      continue
                  
                  if process_tiktok_reel(vad_clip, img_path, output_path):
                      size_mb = os.path.getsize(output_path) / (1024 * 1024)
                      print(f"  ✅ Merged successfully ({size_mb:.1f}MB)")
                      
                      send_video(output_path, clip['title'])
                      upload_to_youtube(output_path, clip['title'], publish_time)
                      update_last_publish(publish_time)
                  else:
                      print("  ❌ Merge failed")
                  
                  for f in [raw_clip, vad_clip, img_path, output_path]:
                      if os.path.exists(f): os.remove(f)
              
              os.remove(TEMP_VIDEO)
              return True

          # ========== التشغيل ==========
          print("="*60)
          print("YouTube Ultimate QA Extractor - Every 3 Days")
          print(f"Max clip duration: {MAX_CLIP_DURATION} seconds (3 minutes)")
          print("="*60)
          
          last_publish = load_last_publish()
          if last_publish:
              last_time = datetime.datetime.strptime(last_publish, "%Y-%m-%dT%H:%M:%SZ").replace(tzinfo=datetime.timezone.utc)
              algiers_last = last_time + datetime.timedelta(hours=1)
              print(f"📅 Last publish time: {algiers_last.strftime('%H:%M')} (توقيت الجزائر) on {last_time.date()}")
          else:
              print("📅 No previous publish time found. Starting fresh.")
          
          if not GITHUB_TOKEN:
              print("❌ GITHUB_TOKEN not found!")
              sys.exit(1)
          
          if not COOKIES_TEXT:
              print("❌ COOKIES_TEXT not found!")
              sys.exit(1)
          
          if not GEMINI_KEY:
              print("❌ GEMINI_API_KEY not found!")
              sys.exit(1)
          
          first_url, remaining_urls, file_sha = get_first_url()
          
          if not first_url:
              print("✅ No videos to process")
              sys.exit(0)
          
          print(f"\n🚀 Processing: {first_url}")
          success = process_video(first_url)
          
          if success:
              if update_videos_file(remaining_urls, file_sha):
                  print(f"\n✅ Video processed successfully and removed from list!")
              else:
                  print(f"\n⚠️ Video processed but failed to update list")
          else:
              print(f"\n❌ Video processing failed. URL remains in videos.txt")
              sys.exit(1)
          
          last_publish = load_last_publish()
          if last_publish:
              last_time = datetime.datetime.strptime(last_publish, "%Y-%m-%dT%H:%M:%SZ").replace(tzinfo=datetime.timezone.utc)
              algiers_last = last_time + datetime.timedelta(hours=1)
              print(f"\n📊 Last publish time updated to: {algiers_last.strftime('%H:%M')} (توقيت الجزائر)")
          
          print("\n🏁 Daily job completed!")
