name: Full Video Processing Pipeline

on:
  workflow_dispatch:
    inputs:
      youtube_url:
        description: 'YouTube Video URL'
        required: true
        default: 'https://www.youtube.com/live/R36qfvXK3XQ'
      telegram_user_id:
        description: 'Target Telegram User/Chat ID'
        required: true
        default: '-1004447957881'

jobs:
  full_pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          pip install yt-dlp telethon requests Pillow webrtcvad
          pip install youtube-transcript-api --upgrade
          pip install --upgrade yt-dlp

      - name: Download cookies file
        run: |
          curl -L -o cookies.txt "https://raw.githubusercontent.com/bijadex09/mshmsdin/main/cookies.txt"
          if [ -f cookies.txt ] && [ -s cookies.txt ]; then
            echo "✅ Cookies file downloaded ($(wc -l < cookies.txt) lines)"
          else
            echo "⚠️ Failed to download cookies file"
            echo "" > cookies.txt
          fi

      - name: Run Full Processing Pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          YOUTUBE_URL: ${{ github.event.inputs.youtube_url }}
          TELEGRAM_TARGET: ${{ github.event.inputs.telegram_user_id }}
        shell: python
        run: |
          import os
          import re
          import subprocess
          import json
          import asyncio
          import requests
          import tempfile
          import shutil
          import sys
          import glob
          from pathlib import Path
          from PIL import Image, ImageDraw, ImageFont
          from telethon import TelegramClient
          
          # استيراد youtube-transcript-api
          from youtube_transcript_api import YouTubeTranscriptApi
          
          # ======================================================================
          # الإعدادات والثوابت
          # ======================================================================
          API_ID = 24629594
          API_HASH = "a79fa760e65af09a85eb2cc97cb2263c"
          BOT_TOKEN = "8248329215:AAGl3C96vZQ0B9VuDTX2m7IQt--WHDXJmFI"
          
          GEMINI_API_KEY = os.environ['GEMINI_API_KEY']
          YOUTUBE_URL = os.environ['YOUTUBE_URL']
          TELEGRAM_TARGET = os.environ['TELEGRAM_TARGET']
          
          COOKIES_FILE = 'cookies.txt'
          VIDEO_FILENAME = 'downloaded_video.mp4'
          SRT_FILENAME = 'subtitles.srt'
          TIMESTAMPS_FILENAME = 'timestamps.txt'
          
          TEMP_DIR = tempfile.mkdtemp(prefix='video_processing_')
          
          print("="*60)
          print("🎯 Target: " + TELEGRAM_TARGET)
          print("📺 Video: " + YOUTUBE_URL)
          print("="*60)
          
          # ======================================================================
          # الدوال المساعدة
          # ======================================================================
          def extract_video_id(url):
              """استخراج معرف الفيديو من رابط يوتيوب"""
              patterns = [
                  r'(?:youtube\.com/watch\?v=|youtu\.be/|youtube\.com/embed/|youtube\.com/v/|youtube\.com/live/)([a-zA-Z0-9_-]{11})',
                  r'youtube\.com/watch\?.*v=([a-zA-Z0-9_-]{11})',
                  r'youtube\.com/shorts/([a-zA-Z0-9_-]{11})',
              ]
              for pattern in patterns:
                  match = re.search(pattern, url)
                  if match:
                      return match.group(1)
              return None
          
          def time_to_seconds(time_str):
              if not time_str: return 0
              parts = list(map(int, time_str.strip().split(':')))
              if len(parts) == 2:
                  return parts[0] * 60 + parts[1]
              elif len(parts) == 3:
                  return parts[0] * 3600 + parts[1] * 60 + parts[2]
              return 0
          
          def sanitize_filename(title):
              safe = "".join(c for c in title if c.isalnum() or c == ' ' or c in '_-')
              safe = safe.replace(' ', '_')
              return safe[:80]
          
          def send_telegram_message(message):
              """إرسال رسالة تنبيه إلى تلجرام"""
              try:
                  async def send():
                      client = TelegramClient('notify_session', API_ID, API_HASH)
                      await client.start(bot_token=BOT_TOKEN)
                      try:
                          target = int(TELEGRAM_TARGET)
                      except:
                          target = TELEGRAM_TARGET
                      await client.send_message(target, message, link_preview=False)
                      await client.disconnect()
                  asyncio.run(send())
              except Exception as e:
                  print("  ⚠️ Telegram notification failed: " + str(e)[:100])
          
          def format_transcript_to_srt(transcript_list):
              """تحويل قائمة الترجمات إلى تنسيق SRT"""
              srt_lines = []
              for i, item in enumerate(transcript_list, 1):
                  start_time = item['start']
                  duration = item['duration']
                  end_time = start_time + duration
                  text = item['text'].replace('\n', ' ')
                  
                  # تنسيق الوقت
                  start_h = int(start_time // 3600)
                  start_m = int((start_time % 3600) // 60)
                  start_s = int(start_time % 60)
                  start_ms = int((start_time % 1) * 1000)
                  
                  end_h = int(end_time // 3600)
                  end_m = int((end_time % 3600) // 60)
                  end_s = int(end_time % 60)
                  end_ms = int((end_time % 1) * 1000)
                  
                  start_formatted = "{:02d}:{:02d}:{:02d},{:03d}".format(start_h, start_m, start_s, start_ms)
                  end_formatted = "{:02d}:{:02d}:{:02d},{:03d}".format(end_h, end_m, end_s, end_ms)
                  
                  srt_lines.append(str(i))
                  srt_lines.append(start_formatted + " --> " + end_formatted)
                  srt_lines.append(text)
                  srt_lines.append("")
              
              return "\n".join(srt_lines)
          
          # ======================================================================
          # المرحلة 1: استخراج الترجمة
          # ======================================================================
          print("\n" + "="*60)
          print("📥 المرحلة 1: استخراج الترجمة")
          print("="*60)
          
          video_id = extract_video_id(YOUTUBE_URL)
          
          if not video_id:
              print("❌ Could not extract video ID from URL: " + YOUTUBE_URL)
              send_telegram_message("❌ فشل استخراج معرف الفيديو")
              sys.exit(1)
          
          print("📋 Video ID: " + video_id)
          
          srt_content = ""
          transcript_found = False
          
          # عرض إصدار المكتبة
          try:
              import youtube_transcript_api
              print("📚 youtube-transcript-api version: " + str(youtube_transcript_api.__version__))
          except:
              print("⚠️ Could not determine version")
          
          # محاولة 1: الحصول على الترجمة العربية مباشرة
          print("\n🔄 محاولة 1: الترجمة العربية...")
          try:
              transcript_list = YouTubeTranscriptApi.get_transcript(video_id, languages=['ar'])
              if transcript_list:
                  srt_content = format_transcript_to_srt(transcript_list)
                  transcript_found = True
                  print("✅ Found Arabic transcript! (" + str(len(transcript_list)) + " lines)")
          except Exception as e1:
              print("⚠️ Arabic not available: " + str(e1)[:150])
          
          # محاولة 2: الحصول على أي ترجمة متاحة
          if not transcript_found:
              print("\n🔄 محاولة 2: أي ترجمة متاحة...")
              try:
                  # جلب قائمة الترجمات المتاحة أولاً
                  transcript_list = YouTubeTranscriptApi.list_transcripts(video_id)
                  
                  print("📋 Available transcripts:")
                  available_transcripts = []
                  
                  for transcript in transcript_list:
                      try:
                          lang = transcript.language
                          lang_code = transcript.language_code
                          is_generated = transcript.is_generated
                          print("  - " + lang + " (" + lang_code + ")" + 
                                (" [auto]" if is_generated else " [manual]"))
                          available_transcripts.append({
                              'language': lang,
                              'code': lang_code,
                              'generated': is_generated
                          })
                      except:
                          continue
                  
                  if available_transcripts:
                      # جلب الترجمة بأي لغة متاحة
                      for lang_info in available_transcripts:
                          if transcript_found:
                              break
                          lang_code = lang_info['code']
                          print("\n  🔄 Trying: " + lang_info['language'] + " (" + lang_code + ")")
                          try:
                              transcript_data = YouTubeTranscriptApi.get_transcript(video_id, languages=[lang_code])
                              if transcript_data:
                                  srt_content = format_transcript_to_srt(transcript_data)
                                  transcript_found = True
                                  print("  ✅ Got transcript in " + lang_info['language'] + "!")
                                  break
                          except:
                              continue
                  
              except Exception as e2:
                  print("⚠️ Could not list transcripts: " + str(e2)[:150])
          
          # محاولة 3: get_transcript بدون تحديد لغة
          if not transcript_found:
              print("\n🔄 محاولة 3: get_transcript بدون تحديد لغة...")
              try:
                  transcript_data = YouTubeTranscriptApi.get_transcript(video_id)
                  if transcript_data:
                      srt_content = format_transcript_to_srt(transcript_data)
                      transcript_found = True
                      print("✅ Got default transcript! (" + str(len(transcript_data)) + " lines)")
              except Exception as e3:
                  print("⚠️ Default transcript failed: " + str(e3)[:150])
          
          # محاولة 4: استخدام yt-dlp كخطة بديلة
          if not transcript_found:
              print("\n🔄 محاولة 4: yt-dlp لاستخراج الترجمة...")
              try:
                  cmd = [
                      'yt-dlp',
                      '--cookies', COOKIES_FILE,
                      '--write-auto-subs',
                      '--sub-langs', 'ar,en',
                      '--convert-subs', 'srt',
                      '--skip-download',
                      '--output', 'subtitles',
                      '--no-warnings',
                      '--no-check-certificates',
                      YOUTUBE_URL
                  ]
                  result = subprocess.run(cmd, capture_output=True, text=True, timeout=120)
                  
                  if result.stdout:
                      print(result.stdout[-500:])
                  if result.stderr:
                      # تجاهل تحذيرات n challenge
                      stderr_lines = result.stderr.split('\n')
                      for line in stderr_lines[-5:]:
                          if 'ERROR' in line:
                              print("  ⚠️ " + line[:200])
                  
                  for f in glob.glob('*.ar.srt') + glob.glob('*.en.srt') + glob.glob('*.srt'):
                      if os.path.exists(f) and os.path.getsize(f) > 100:
                          with open(f, 'r', encoding='utf-8') as sf:
                              srt_content = sf.read()
                          transcript_found = True
                          print("✅ Found SRT via yt-dlp: " + f + " (" + str(len(srt_content)) + " chars)")
                          break
              except Exception as e4:
                  print("⚠️ yt-dlp fallback failed: " + str(e4)[:150])
          
          if not transcript_found or not srt_content:
              print("\n" + "="*60)
              print("❌ FAILED: Could not get any transcript")
              print("="*60)
              print("\n💡 هذا الفيديو قد لا يحتوي على ترجمة متاحة")
              
              error_msg = (
                  "❌ **فشل استخراج الترجمة**\n\n"
                  + "🔗 [الفيديو](" + YOUTUBE_URL + ")\n"
                  + "⚠️ لم يتم العثور على أي ترجمة\n\n"
                  + "💡 **الحلول:**\n"
                  + "• الفيديو لا يحتوي على ترجمة متاحة\n"
                  + "• جرب فيديو آخر يحتوي على ترجمة"
              )
              send_telegram_message(error_msg)
              sys.exit(1)
          
          # حفظ ملف SRT
          with open(SRT_FILENAME, 'w', encoding='utf-8') as f:
              f.write(srt_content)
          
          srt_len = len(srt_content)
          print("\n✅ Successfully got transcript!")
          print("   Size: " + str(srt_len) + " characters")
          print("   Preview:")
          preview_lines = srt_content.split('\n')[:10]
          for line in preview_lines:
              if line.strip():
                  print("   " + line[:150])
          
          # ======================================================================
          # المرحلة 2: تحليل مع Gemini
          # ======================================================================
          print("\n" + "="*60)
          print("🤖 المرحلة 2: تحليل مع Gemini Flash")
          print("="*60)
          
          prompt = """الوثيقة هي نص تفريغ فيديو عربي.

          مهمتك: استخراج جميع الأسئلة والإجابات بدقة.

          **تنسيق الإخراج الإلزامي:**
          • [START_TIME] | [END_TIME] | [العنوان]

          ابدأ الإخراج مباشرة.

          النص:
          """ + srt_content
          
          headers = {
              'Content-Type': 'application/json',
              'X-goog-api-key': GEMINI_API_KEY,
          }
          
          data = {
              "contents": [{
                  "parts": [{"text": prompt}]
              }],
              "generationConfig": {
                  "temperature": 0.1,
                  "maxOutputTokens": 8192,
              }
          }
          
          print("📤 Sending to Gemini API...")
          
          try:
              response = requests.post(
                  "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent",
                  headers=headers,
                  json=data,
                  timeout=120
              )
              
              if response.status_code != 200:
                  print("❌ Gemini API Error: " + str(response.status_code))
                  print(response.text[:300])
                  send_telegram_message("❌ فشل تحليل الترجمة - خطأ " + str(response.status_code))
                  sys.exit(1)
              
              result = response.json()
              timestamps_text = result['candidates'][0]['content']['parts'][0]['text']
              print("✅ Gemini response received")
              
          except Exception as e:
              print("❌ Gemini error: " + str(e)[:200])
              send_telegram_message("❌ فشل تحليل الترجمة")
              sys.exit(1)
          
          # حفظ وتحليل المواقيت
          with open(TIMESTAMPS_FILENAME, 'w', encoding='utf-8') as f:
              f.write(timestamps_text)
          
          print("\n📋 Extracted timestamps:")
          print(timestamps_text[:500])
          
          timestamp_pattern = r'•\s*([\d:]+)\s*\|\s*([\d:]+)\s*\|\s*(.*)'
          matches = re.findall(timestamp_pattern, timestamps_text)
          
          if not matches:
              print("\n❌ No valid timestamps found!")
              send_telegram_message("❌ فشل استخراج المواقيت من نص Gemini")
              sys.exit(1)
          
          matches_count = len(matches)
          print("\n✅ Successfully extracted " + str(matches_count) + " segments!")
          
          for i, (start, end, title) in enumerate(matches[:5]):
              print("  " + str(i+1) + ". [" + start + " -> " + end + "] " + title)
          
          if matches_count > 5:
              print("  ... and " + str(matches_count - 5) + " more segments")
          
          # ======================================================================
          # المرحلة 3: تحميل الفيديو
          # ======================================================================
          print("\n" + "="*60)
          print("📥 المرحلة 3: تحميل الفيديو")
          print("="*60)
          
          start_msg = "✅ تم تحليل " + str(matches_count) + " مقطع\n📥 جاري تحميل الفيديو..."
          send_telegram_message(start_msg)
          
          print("\n📥 Downloading video (this may take a while)...")
          
          video_downloaded = False
          
          # محاولة 1: مع cookies
          cmd1 = [
              'yt-dlp',
              '--cookies', COOKIES_FILE,
              '--live-from-start',
              '--output', VIDEO_FILENAME,
              '--no-warnings',
              '--no-check-certificates',
              YOUTUBE_URL
          ]
          print("🔄 Attempt 1: with cookies...")
          result1 = subprocess.run(cmd1, capture_output=True, text=True, timeout=3600)
          
          if result1.stdout:
              for line in result1.stdout.split('\n')[-5:]:
                  if line.strip():
                      print("  " + line[:150])
          
          if result1.returncode == 0 and os.path.exists(VIDEO_FILENAME) and os.path.getsize(VIDEO_FILENAME) > 1000000:
              video_downloaded = True
              print("✅ Downloaded with cookies!")
          else:
              # محاولة 2: بدون cookies
              print("🔄 Attempt 2: without cookies...")
              cmd2 = [
                  'yt-dlp',
                  '--live-from-start',
                  '--output', VIDEO_FILENAME,
                  '--no-warnings',
                  '--no-check-certificates',
                  YOUTUBE_URL
              ]
              result2 = subprocess.run(cmd2, capture_output=True, text=True, timeout=3600)
              
              if result2.stdout:
                  for line in result2.stdout.split('\n')[-5:]:
                      if line.strip():
                          print("  " + line[:150])
              
              if result2.returncode == 0 and os.path.exists(VIDEO_FILENAME) and os.path.getsize(VIDEO_FILENAME) > 1000000:
                  video_downloaded = True
                  print("✅ Downloaded without cookies!")
          
          if not video_downloaded:
              print("\n❌ Video download failed!")
              send_telegram_message("❌ فشل تحميل الفيديو")
              sys.exit(1)
          
          video_size = os.path.getsize(VIDEO_FILENAME) / (1024*1024)
          print("\n✅ Video downloaded successfully!")
          print("   Size: " + str(round(video_size, 1)) + " MB")
          
          # ======================================================================
          # دوال المعالجة
          # ======================================================================
          def create_thumbnail(title, output_path):
              width, height = 1080, 1920
              image = Image.new('RGB', (width, height), color='#1a1a2e')
              draw = ImageDraw.Draw(image)
              for i in range(height):
                  r = int(26 + (i/height) * 30)
                  g = int(26 + (i/height) * 20)
                  b = int(46 + (i/height) * 40)
                  draw.line([(0, i), (width, i)], fill=(r, g, b))
              try:
                  font_path = "/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf"
                  font = ImageFont.truetype(font_path, 50) if os.path.exists(font_path) else ImageFont.load_default()
              except:
                  font = ImageFont.load_default()
              words = title.split()
              lines, current = [], ""
              for w in words:
                  t = current + " " + w if current else w
                  if len(t) <= 22: current = t
                  else:
                      if current: lines.append(current)
                      current = w
              if current: lines.append(current)
              if not lines: lines = [title]
              y = height // 3
              for line in lines:
                  bbox = draw.textbbox((0, 0), line, font=font)
                  tw, th = bbox[2]-bbox[0], bbox[3]-bbox[1]
                  x = (width - tw) // 2
                  draw.text((x+3, y+3), line, font=font, fill='#00000080')
                  draw.text((x, y), line, font=font, fill='white')
                  y += th + 30
              for i in range(5): draw.rectangle([i, i, width-i-1, height-i-1], outline='#e94560')
              image.save(output_path, 'PNG', quality=95)
              return True
          
          def cut_clip(s, e, out):
              cmd = ['ffmpeg', '-y', '-i', VIDEO_FILENAME, '-ss', s, '-to', e, '-c', 'copy', '-loglevel', 'error', out]
              return subprocess.run(cmd, capture_output=True).returncode == 0
          
          def merge_with_image(v, i, out):
              fc = "[1:v]loop=loop=-1:size=1:start=0,setpts=PTS-STARTPTS,scale=1080:1920,setsar=1[img];[0:v]scale=1080:1920:force_original_aspect_ratio=decrease,pad=1080:1920:(ow-iw)/2:(oh-ih)/2[video];[img][video]overlay=0:0:shortest=1"
              cmd = ['ffmpeg', '-y', '-i', v, '-i', i, '-filter_complex', fc, '-c:v', 'libx264', '-preset', 'ultrafast', '-crf', '28', '-c:a', 'aac', '-b:a', '96k', '-shortest', '-loglevel', 'error', out]
              return subprocess.run(cmd, capture_output=True).returncode == 0
          
          def remove_silence(inp, out):
              try:
                  import webrtcvad, wave
              except:
                  shutil.copy2(inp, out)
                  return True
              td = tempfile.mkdtemp()
              ta = os.path.join(td, "a.wav")
              subprocess.run(['ffmpeg', '-y', '-i', inp, '-ar', '16000', '-ac', '1', '-loglevel', 'quiet', ta], capture_output=True)
              if not os.path.exists(ta): shutil.rmtree(td); return False
              vad = webrtcvad.Vad(3)
              with wave.open(ta, 'rb') as w: rate, frames = w.getframerate(), w.readframes(w.getnframes())
              fs = int(rate*30/1000)*2
              segs, sp, st = [], False, 0.0
              for i in range(0, len(frames)-fs, fs):
                  try:
                      iss = vad.is_speech(frames[i:i+fs], rate)
                      ct = i/(rate*2)
                      if iss and not sp: sp, st = True, max(0, ct-0.3)
                      elif not iss and sp: sp = False; segs.append((st, ct+0.3))
                  except: continue
              if sp: segs.append((st, len(frames)/(rate*2)))
              if not segs: shutil.copy2(inp, out); shutil.rmtree(td); return True
              ms = [segs[0]]
              for s in segs[1:]:
                  if s[0]-ms[-1][1] <= 0.5: ms[-1] = (ms[-1][0], s[1])
                  else: ms.append(s)
              cf = os.path.join(td, "c.txt"); sfs = []
              for i, (s, e) in enumerate(ms):
                  if e-s < 0.5: continue
                  sf = os.path.join(td, "s" + str(i).zfill(3) + ".mp4")
                  subprocess.run(['ffmpeg', '-y', '-i', inp, '-ss', str(s), '-to', str(e), '-c', 'copy', '-loglevel', 'quiet', sf], capture_output=True)
                  if os.path.exists(sf) and os.path.getsize(sf)>0: sfs.append(sf)
              if not sfs: shutil.copy2(inp, out); shutil.rmtree(td); return True
              with open(cf, 'w') as f:
                  for s in sfs: f.write("file '" + s + "'\n")
              ok = subprocess.run(['ffmpeg', '-y', '-f', 'concat', '-safe', '0', '-i', cf, '-c', 'copy', '-loglevel', 'quiet', out], capture_output=True).returncode == 0
              shutil.rmtree(td)
              return ok
          
          def compress_video(inp, out, ts=45):
              cmd = ['ffmpeg', '-y', '-i', inp, '-c:v', 'libx264', '-preset', 'ultrafast', '-crf', '35', '-c:a', 'aac', '-b:a', '48k', '-fs', str(ts)+'M', '-loglevel', 'error', out]
              return subprocess.run(cmd, capture_output=True).returncode == 0
          
          # ======================================================================
          # معالجة وإرسال المقاطع
          # ======================================================================
          print("\n" + "="*60)
          print("🔄 Processing and sending clips")
          print("="*60)
          
          async def process_and_send():
              client = TelegramClient('ts', API_ID, API_HASH)
              await client.start(bot_token=BOT_TOKEN)
              try: target = int(TELEGRAM_TARGET)
              except: target = TELEGRAM_TARGET
              
              total = len(matches)
              await client.send_message(target, "🎬 بدء معالجة " + str(total) + " مقطع...")
              
              sent, failed = 0, 0
              for idx, (ss, es, title) in enumerate(matches):
                  ssec, esec = time_to_seconds(ss), time_to_seconds(es)
                  if esec <= ssec: continue
                  dm = (esec-ssec)/60
                  
                  print("\n📹 Clip " + str(idx+1) + "/" + str(total) + ": " + title)
                  print("   Time: " + ss + " -> " + es + " (" + str(round(dm, 1)) + " min)")
                  
                  ct = tempfile.mkdtemp(dir=TEMP_DIR)
                  try:
                      cp = os.path.join(ct, "c.mp4")
                      if not cut_clip(ss, es, cp):
                          print("   ❌ Cut failed")
                          failed += 1
                          continue
                      print("   ✅ Cut: " + str(round(os.path.getsize(cp)/1024/1024, 1)) + " MB")
                      
                      ip = os.path.join(ct, "t.png")
                      mp = cp
                      if create_thumbnail(title, ip):
                          mp2 = os.path.join(ct, "m.mp4")
                          if merge_with_image(cp, ip, mp2):
                              mp = mp2
                              print("   ✅ Merged")
                      
                      fp = os.path.join(ct, "f.mp4")
                      if remove_silence(mp, fp):
                          print("   ✅ Silence removed: " + str(round(os.path.getsize(fp)/1024/1024, 1)) + " MB")
                      else:
                          fp = mp
                      
                      cap = "**" + title + "**\n📌 " + str(idx+1) + "/" + str(total) + "\n⏱️ " + ss + "→" + es
                      
                      try:
                          await client.send_file(target, fp, caption=cap, supports_streaming=True)
                          sent += 1
                          print("   ✅ Sent!")
                      except Exception as e:
                          err_str = str(e)
                          if "too big" in err_str.lower() or "large" in err_str.lower():
                              print("   🔄 Compressing...")
                              comp = os.path.join(ct, "comp.mp4")
                              if compress_video(fp, comp):
                                  try:
                                      await client.send_file(target, comp, caption=cap+"\n(مضغوط)", supports_streaming=True)
                                      sent += 1
                                      print("   ✅ Sent compressed!")
                                  except:
                                      failed += 1
                              else:
                                  failed += 1
                          else:
                              failed += 1
                              print("   ❌ Send failed: " + err_str[:100])
                      
                      if (idx+1) % 5 == 0:
                          progress = "📊 " + str(idx+1) + "/" + str(total) + " | ✅" + str(sent) + " ❌" + str(failed)
                          await client.send_message(target, progress)
                          
                  finally:
                      shutil.rmtree(ct, ignore_errors=True)
                  
                  await asyncio.sleep(2)
              
              final_msg = "✅ **تم الانتهاء!**\n\n📊 " + str(total) + " مقطع\n✅ تم: " + str(sent) + "\n❌ فشل: " + str(failed)
              await client.send_message(target, final_msg)
              await client.disconnect()
          
          asyncio.run(process_and_send())
          
          # تنظيف
          print("\n🧹 Cleaning up...")
          for f in [VIDEO_FILENAME, SRT_FILENAME, TIMESTAMPS_FILENAME, COOKIES_FILE]:
              if os.path.exists(f):
                  os.remove(f)
          shutil.rmtree(TEMP_DIR, ignore_errors=True)
          print("\n✅ All done!")
