name: YouTube Video & Transcript Downloader

on:
  workflow_dispatch:
    inputs:
      youtube_url:
        description: 'YouTube Video URL'
        required: true
        default: 'https://youtu.be/NdVhKakgGHM'
      telegram_target:
        description: 'Telegram Channel/User ID'
        required: true
        default: '-1004447957881'

jobs:
  process:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup System Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg
          pip install yt-dlp telethon requests Pillow webrtcvad youtube-transcript-api
          pip install --upgrade pip
          pip install --upgrade yt-dlp

      - name: Download Video & Extract Transcript
        env:
          YT_URL: ${{ github.event.inputs.youtube_url }}
          TG_TARGET: ${{ github.event.inputs.telegram_target }}
          COOKIES_TEXT: ${{ secrets.COOKIES_TEXT }}
        shell: python
        run: |
          import os
          import sys
          import re
          import subprocess
          import requests
          from youtube_transcript_api import YouTubeTranscriptApi

          BOT_TOKEN = "8248329215:AAGl3C96vZQ0B9VuDTX2m7IQt--WHDXJmFI"
          YT_URL = os.environ['YT_URL']
          TG_TARGET = os.environ['TG_TARGET']
          COOKIES_TEXT = os.environ.get('COOKIES_TEXT', '')
          
          BASE_DIR = os.path.dirname(os.path.abspath(__file__))
          TEMP_VIDEO = os.path.join(BASE_DIR, "temp_video.mp4")
          COOKIES_FILE = os.path.join(BASE_DIR, "cookies.txt")
          TRANSCRIPT_FILE = os.path.join(BASE_DIR, "transcript.txt")

          def tg_msg(text):
              try:
                  url = f"https://api.telegram.org/bot{BOT_TOKEN}/sendMessage"
                  requests.post(url, json={"chat_id": int(TG_TARGET), "text": text}, timeout=10)
              except: pass

          def vid_id(u):
              patterns = [r"youtu\.be/([^&?/]+)", r"youtube\.com/watch\?v=([^&?/]+)", r"youtube\.com/embed/([^&?/]+)", r"youtube\.com/live/([^&?/]+)"]
              for pattern in patterns:
                  match = re.search(pattern, u)
                  if match: return match.group(1)
              return None

          # 1. إنشاء ملف الكوكيز مؤقتاً
          if COOKIES_TEXT:
              with open(COOKIES_FILE, "w", encoding="utf-8") as f:
                  f.write(COOKIES_TEXT)
          else:
              print("❌ COOKIES_TEXT secret is missing!")
              tg_msg("❌ خطأ: لم يتم العثور على السيكرت COOKIES_TEXT")
              sys.exit(1)

          # 2. خطوة تحميل الفيديو الأساسية الناجحة
          command = [
              "yt-dlp", "--cookies", COOKIES_FILE, "--js-runtime", "node",
              "--remote-components", "ejs:github", "-f", 
              "bestvideo[height<=1080][ext=mp4]+bestaudio[ext=m4a]/best[height<=1080][ext=mp4]/best",
              "--merge-output-format", "mp4", "-o", TEMP_VIDEO, YT_URL
          ]
          
          print("\n📥 Downloading video...")
          tg_msg("📥 جاري تحميل الفيديو أولاً...")
          
          video_success = False
          try:
              result = subprocess.run(command, capture_output=True, text=True)
              video_success = result.returncode == 0 and os.path.exists(TEMP_VIDEO)
          except Exception as e:
              print(f"❌ Subprocess failed: {e}")

          # حذف ملف الكوكيز فوراً للأمان
          if os.path.exists(COOKIES_FILE): 
              os.remove(COOKIES_FILE)

          if not video_success:
              print("❌ Download failed!")
              tg_msg("❌ فشل تحميل الفيديو.")
              sys.exit(1)

          size_mb = os.path.getsize(TEMP_VIDEO) / (1024 * 1024)
          print(f"✅ Download successful! File size: {size_mb:.2f} MB")

          # 3. خطوة استخراج الترجمة وحفظها في ملف نصي
          print("\n📜 Extracting transcript...")
          v_id = vid_id(YT_URL)
          lines = []
          
          try:
              # محاولة جلب الترجمة العربية أولاً، وتجربة الإنجليزية تلقائياً كبديل
              try:
                  srt = YouTubeTranscriptApi.get_transcript(v_id, languages=['ar'])
                  print("✅ Arabic transcript extracted.")
              except:
                  srt = YouTubeTranscriptApi.get_transcript(v_id, languages=['en', 'fr', 'es'])
                  print("✅ Alternative language transcript extracted.")
                  
              for item in srt:
                  seconds = float(item['start'])
                  h = int(seconds // 3600)
                  m = int((seconds % 3600) // 60)
                  s = int(seconds % 60)
                  t_str = f"{h:02d}:{m:02d}:{s:02d}"
                  txt = item['text'].replace('\n', ' ').strip()
                  if txt:
                      lines.append(f"{t_str} | {txt}")
                      
              # حفظ النص في ملف بجانب الفيديو
              with open(TRANSCRIPT_FILE, "w", encoding="utf-8") as f:
                  f.write('\n'.join(lines))
                  
              print(f"✅ Transcript saved successfully! Total lines: {len(lines)}")
              tg_msg(f"✅ تم تحميل الفيديو بنجاح ({size_mb:.2f} MB).\n📜 تم استخراج ملف الترجمة بنجاح ({len(lines)} سطر).\n\nبانتظار توجيهاتك القادمة لمعالجة النص والتقطيع...")
              
          except Exception as e:
              print(f"❌ Transcript extraction failed: {e}")
              tg_msg(f"✅ تم تحميل الفيديو بنجاح ({size_mb:.2f} MB).\n⚠️ تنبيه: تعذر استخراج النص التلقائي من يوتيوب لهذا الفيديو.")
