name: Full Video Processing Pipeline

on:
  workflow_dispatch:
    inputs:
      youtube_url:
        description: 'YouTube Video URL'
        required: true
        default: 'https://www.youtube.com/live/R36qfvXK3XQ'
      telegram_user_id:
        description: 'Target Telegram User/Chat ID'
        required: true
        default: '-1004447957881'

jobs:
  full_pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          pip install yt-dlp telethon requests Pillow webrtcvad

      - name: Create cookies.txt for yt-dlp
        env:
          YT_COOKIES: ${{ secrets.YT_COOKIES }}
        run: echo "$YT_COOKIES" > cookies.txt

      - name: Run Full Processing Pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          YOUTUBE_URL: ${{ github.event.inputs.youtube_url }}
          TELEGRAM_TARGET: ${{ github.event.inputs.telegram_user_id }}
        shell: python
        run: |
          import os
          import re
          import subprocess
          import json
          import asyncio
          import requests
          import tempfile
          import shutil
          import sys
          from pathlib import Path
          from PIL import Image, ImageDraw, ImageFont
          from telethon import TelegramClient
          
          # ======================================================================
          # الإعدادات والثوابت
          # ======================================================================
          API_ID = 24629594
          API_HASH = "a79fa760e65af09a85eb2cc97cb2263c"
          BOT_TOKEN = "8248329215:AAGl3C96vZQ0B9VuDTX2m7IQt--WHDXJmFI"
          
          GEMINI_API_KEY = os.environ['GEMINI_API_KEY']
          YOUTUBE_URL = os.environ['YOUTUBE_URL']
          TELEGRAM_TARGET = os.environ['TELEGRAM_TARGET']
          
          COOKIES_FILE = 'cookies.txt'
          VIDEO_FILENAME = 'downloaded_video.mp4'
          SRT_FILENAME = 'subtitles.srt'
          TIMESTAMPS_FILENAME = 'timestamps.txt'
          
          TEMP_DIR = tempfile.mkdtemp(prefix='video_processing_')
          
          print(f"🎯 Target: {TELEGRAM_TARGET}")
          print(f"📺 Video: {YOUTUBE_URL}")
          print(f"📁 Working directory: {TEMP_DIR}")
          
          # ======================================================================
          # الدوال المساعدة
          # ======================================================================
          def run_command(cmd, error_message="Command failed", critical=False):
              print(f"  🏃 {' '.join(cmd[:5])}...")
              result = subprocess.run(cmd, capture_output=True, text=True)
              if result.returncode != 0:
                  print(f"  ⚠️ {error_message}")
                  if result.stderr:
                      print(f"  {result.stderr[:300]}")
                  if critical:
                      return False
              return result.returncode == 0
          
          def time_to_seconds(time_str):
              if not time_str: return 0
              parts = list(map(int, time_str.strip().split(':')))
              if len(parts) == 2:
                  return parts[0] * 60 + parts[1]
              elif len(parts) == 3:
                  return parts[0] * 3600 + parts[1] * 60 + parts[2]
              return 0
          
          def sanitize_filename(title):
              safe = "".join(c for c in title if c.isalnum() or c == ' ' or c in '_-')
              safe = safe.replace(' ', '_')
              return safe[:80]
          
          def send_telegram_message(message):
              """إرسال رسالة تنبيه إلى تلجرام"""
              try:
                  async def send():
                      client = TelegramClient('notify_session', API_ID, API_HASH)
                      await client.start(bot_token=BOT_TOKEN)
                      try:
                          target = int(TELEGRAM_TARGET)
                      except:
                          target = TELEGRAM_TARGET
                      await client.send_message(target, message, link_preview=False)
                      await client.disconnect()
                  asyncio.run(send())
              except Exception as e:
                  print(f"  ⚠️ Could not send Telegram notification: {e}")
          
          # ======================================================================
          # المرحلة 1: تحميل الترجمة فقط أولاً
          # ======================================================================
          print("\n" + "="*60)
          print("📥 المرحلة 1: تحميل الترجمة (SRT)")
          print("="*60)
          
          # محاولة تحميل الترجمة التلقائية
          print("🔄 محاولة تحميل الترجمة التلقائية...")
          srt_downloaded = False
          
          # المحاولة الأولى: ترجمة تلقائية
          cmd_auto_subs = [
              'yt-dlp',
              '--cookies', COOKIES_FILE,
              '--write-auto-subs',
              '--sub-langs', 'ar',
              '--convert-subs', 'srt',
              '--skip-download',
              '--output', '%(title)s',
              '--no-playlist',
              YOUTUBE_URL
          ]
          
          if run_command(cmd_auto_subs, "Auto subs download failed"):
              # البحث عن ملف SRT
              for f in os.listdir('.'):
                  if f.endswith('.ar.srt'):
                      os.rename(f, SRT_FILENAME)
                      srt_downloaded = True
                      print(f"✅ Found auto-generated SRT: {f}")
                      break
          
          # المحاولة الثانية: ترجمة يدوية
          if not srt_downloaded:
              print("🔄 محاولة تحميل الترجمة اليدوية...")
              cmd_manual_subs = [
                  'yt-dlp',
                  '--cookies', COOKIES_FILE,
                  '--write-subs',
                  '--sub-langs', 'ar',
                  '--convert-subs', 'srt',
                  '--skip-download',
                  '--output', '%(title)s',
                  '--no-playlist',
                  YOUTUBE_URL
              ]
              
              if run_command(cmd_manual_subs, "Manual subs download failed"):
                  for f in os.listdir('.'):
                      if f.endswith('.ar.srt'):
                          os.rename(f, SRT_FILENAME)
                          srt_downloaded = True
                          print(f"✅ Found manual SRT: {f}")
                          break
          
          # المحاولة الثالثة: أي ترجمة متاحة
          if not srt_downloaded:
              print("🔄 البحث عن أي ملف ترجمة...")
              for f in os.listdir('.'):
                  if f.endswith('.srt'):
                      os.rename(f, SRT_FILENAME)
                      srt_downloaded = True
                      print(f"✅ Found SRT: {f}")
                      break
          
          if not srt_downloaded:
              print("\n❌ لم يتم العثور على أي ترجمة!")
              print("⛔ إيقاف العملية - لا يمكن المتابعة بدون ترجمة")
              
              error_msg = (
                  "❌ **فشل تحميل الترجمة**\n\n"
                  f"🔗 [الفيديو]({YOUTUBE_URL})\n"
                  "⚠️ لم يتم العثور على ترجمة عربية (تلقائية أو يدوية)\n"
                  "📝 يرجى التأكد من توفر ترجمة للفيديو"
              )
              send_telegram_message(error_msg)
              sys.exit(1)
          
          # قراءة محتوى الترجمة
          with open(SRT_FILENAME, 'r', encoding='utf-8') as f:
              srt_content = f.read()
          
          print(f"✅ تم تحميل الترجمة ({len(srt_content)} حرف)")
          
          # ======================================================================
          # المرحلة 2: تحليل الترجمة مع Gemini
          # ======================================================================
          print("\n" + "="*60)
          print("🤖 المرحلة 2: تحليل الترجمة مع Gemini Flash")
          print("="*60)
          
          prompt = f"""
          الوثيقة هي نص تفريغ فيديو عربي لجلسة أسئلة وأجوبة دينية. النص منسق كـ 'HH:MM:SS | النص'.
          
          مهمتك: استخراج جميع الأسئلة والإجابات بدقة، مع تحديد وقت بداية السؤال ووقت نهاية الإجابة لكل مسألة.
          
          **معايير تحديد بداية السؤال (START_TIME):**
          1. ابحث عن الكلمات المفتاحية: 'سؤال'، 'يسأل'، 'أريد أن أسأل'، 'ما حكم'، 'هل يجوز'، 'ما رأيك'
          2. ابحث عن صيغ الاستفهام: 'هل'، 'متى'، 'كيف'، 'لماذا'، 'أين'
          3. ابحث عن انتقال المتحدث من الحديث العام إلى سؤال محدد
          4. ابدأ من أول كلمة للسؤال، وليس من رد المحاضر
          
          **معايير تحديد نهاية الإجابة (END_TIME):**
          1. تنتهي الإجابة عندما ينتقل المتحدث إلى سؤال جديد أو موضوع مختلف تماماً
          2. تنتهي عندما يقول المتحدث كلمات مثل: 'هذا والله أعلم'، 'انتهى'، 'ننتقل للسؤال التالي'
          3. تنتهي عندما يبدأ السائل بسؤال جديد أو يعود المتحدث للرد على سائل آخر
          4. لا تقطع الإجابة في منتصفها - تأكد من تغطية كامل الرد على السؤال
          
          **تنسيق الإخراج الإلزامي:**
          يجب أن يكون الإخراج بالضبط كالتالي:
          • [START_TIME] | [END_TIME] | [العنوان]
          • [START_TIME] | [END_TIME] | [العنوان]
          
          **قواعد الأوقات:**
          1. للأوقات أقل من ساعة: استخدم تنسيق MM:SS فقط
          2. للأوقات أكثر من ساعة: استخدم تنسيق HH:MM:SS
          
          **قواعد العناوين:**
          1. سؤال مختصر لا يتجاوز 10 كلمات
          2. استخدم صيغة السؤال: 'حكم كذا؟'، 'هل يجوز كذا؟'
          
          ابدأ الإخراج مباشرة دون أي مقدمة أو شرح.
          
          {srt_content}
          """
          
          headers = {
              'Content-Type': 'application/json',
              'X-goog-api-key': GEMINI_API_KEY,
          }
          
          data = {
              "contents": [{
                  "parts": [{"text": prompt}]
              }],
              "generationConfig": {
                  "temperature": 0.1,
                  "maxOutputTokens": 8192,
              }
          }
          
          print("📤 إرسال إلى Gemini Flash API...")
          
          try:
              response = requests.post(
                  "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent",
                  headers=headers,
                  json=data,
                  timeout=120
              )
              
              if response.status_code != 200:
                  print(f"❌ Gemini API Error: {response.status_code}")
                  print(f"Response: {response.text[:500]}")
                  
                  error_msg = (
                      f"❌ **فشل تحليل الترجمة**\n\n"
                      f"🔗 [الفيديو]({YOUTUBE_URL})\n"
                      f"⚠️ خطأ في Gemini API: {response.status_code}\n"
                      f"📝 {response.text[:200]}"
                  )
                  send_telegram_message(error_msg)
                  sys.exit(1)
              
              result = response.json()
              
              if 'candidates' not in result or not result['candidates']:
                  print("❌ لا توجد نتائج من Gemini")
                  send_telegram_message(f"❌ **فشل تحليل الترجمة**\n\nلم يعد Gemini أي نتائج")
                  sys.exit(1)
              
              timestamps_text = result['candidates'][0]['content']['parts'][0]['text']
              
          except requests.exceptions.Timeout:
              print("❌ Gemini API timeout")
              send_telegram_message(f"❌ **فشل تحليل الترجمة**\n\nانتهت مهلة Gemini API")
              sys.exit(1)
          except Exception as e:
              print(f"❌ Gemini API error: {e}")
              send_telegram_message(f"❌ **فشل تحليل الترجمة**\n\nخطأ: {str(e)[:200]}")
              sys.exit(1)
          
          # حفظ المواقيت
          with open(TIMESTAMPS_FILENAME, 'w', encoding='utf-8') as f:
              f.write(timestamps_text)
          
          print("✅ تم استخراج المواقيت:")
          print(timestamps_text[:500])
          
          # تحليل المواقيت
          timestamp_pattern = r'•\s*([\d:]+)\s*\|\s*([\d:]+)\s*\|\s*(.*)'
          matches = re.findall(timestamp_pattern, timestamps_text)
          
          if not matches:
              print("\n❌ لم يتم العثور على مواقيت صالحة!")
              print("النص المستخرج:")
              print(timestamps_text[:500])
              
              error_msg = (
                  f"❌ **فشل استخراج المواقيت**\n\n"
                  f"🔗 [الفيديو]({YOUTUBE_URL})\n"
                  f"⚠️ لم يتم العثور على تنسيق المواقيت المطلوب\n"
                  f"📝 نص Gemini:\n{timestamps_text[:300]}"
              )
              send_telegram_message(error_msg)
              sys.exit(1)
          
          print(f"\n✅ تم استخراج {len(matches)} مقطع بنجاح!")
          
          # عرض ملخص المقاطع
          for i, (start, end, title) in enumerate(matches[:5]):
              print(f"  {i+1}. [{start} -> {end}] {title}")
          if len(matches) > 5:
              print(f"  ... و {len(matches)-5} مقاطع أخرى")
          
          # ======================================================================
          # المرحلة 3: تحميل الفيديو الكامل
          # ======================================================================
          print("\n" + "="*60)
          print("📥 المرحلة 3: تحميل الفيديو الكامل")
          print("="*60)
          
          # إرسال إشعار بدء التحميل
          start_msg = (
              f"✅ **تم تحليل الترجمة بنجاح**\n\n"
              f"🔗 [الفيديو]({YOUTUBE_URL})\n"
              f"📊 عدد المقاطع: {len(matches)}\n"
              f"📥 جاري تحميل الفيديو..."
          )
          send_telegram_message(start_msg)
          
          ytdlp_video_cmd = [
              'yt-dlp',
              '--cookies', COOKIES_FILE,
              '--live-from-start',
              '--output', VIDEO_FILENAME,
              '--no-playlist',
              '--no-mtime',
              YOUTUBE_URL
          ]
          
          if not run_command(ytdlp_video_cmd, "Video download failed", critical=True):
              print("\n❌ فشل تحميل الفيديو!")
              error_msg = (
                  f"❌ **فشل تحميل الفيديو**\n\n"
                  f"🔗 [الفيديو]({YOUTUBE_URL})\n"
                  f"✅ تم استخراج {len(matches)} مقطع\n"
                  f"⚠️ لكن فشل تحميل الفيديو"
              )
              send_telegram_message(error_msg)
              sys.exit(1)
          
          if not os.path.exists(VIDEO_FILENAME):
              print("\n❌ ملف الفيديو غير موجود بعد التحميل!")
              sys.exit(1)
          
          video_size = os.path.getsize(VIDEO_FILENAME) / (1024*1024)
          print(f"✅ تم تحميل الفيديو ({video_size:.1f} MB)")
          
          # ======================================================================
          # دوال المعالجة
          # ======================================================================
          def create_thumbnail(title, output_path):
              """إنشاء صورة ثامبنيل"""
              width, height = 1080, 1920
              image = Image.new('RGB', (width, height), color='#1a1a2e')
              draw = ImageDraw.Draw(image)
              
              for i in range(height):
                  r = int(26 + (i/height) * 30)
                  g = int(26 + (i/height) * 20)
                  b = int(46 + (i/height) * 40)
                  draw.line([(0, i), (width, i)], fill=(r, g, b))
              
              try:
                  font_paths = [
                      "/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf",
                      "/usr/share/fonts/truetype/freefont/FreeSansBold.ttf",
                  ]
                  font = None
                  for fp in font_paths:
                      if os.path.exists(fp):
                          font = ImageFont.truetype(fp, 50)
                          break
                  if not font:
                      font = ImageFont.load_default()
              except:
                  font = ImageFont.load_default()
              
              words = title.split()
              lines = []
              current_line = ""
              for word in words:
                  test = current_line + " " + word if current_line else word
                  if len(test) <= 22:
                      current_line = test
                  else:
                      if current_line:
                          lines.append(current_line)
                      current_line = word
              if current_line:
                  lines.append(current_line)
              if not lines:
                  lines = [title]
              
              y_position = height // 3
              for line in lines:
                  bbox = draw.textbbox((0, 0), line, font=font)
                  text_width = bbox[2] - bbox[0]
                  text_height = bbox[3] - bbox[1]
                  x_position = (width - text_width) // 2
                  
                  draw.text((x_position+3, y_position+3), line, font=font, fill='#00000080')
                  draw.text((x_position, y_position), line, font=font, fill='white')
                  y_position += text_height + 30
              
              for i in range(5):
                  draw.rectangle([i, i, width-i-1, height-i-1], outline='#e94560')
              
              image.save(output_path, 'PNG', quality=95)
              return True
          
          def cut_clip(start_str, end_str, output_path):
              cmd = [
                  'ffmpeg', '-y',
                  '-i', VIDEO_FILENAME,
                  '-ss', start_str,
                  '-to', end_str,
                  '-c', 'copy',
                  '-loglevel', 'error',
                  output_path
              ]
              return run_command(cmd, f"Cut failed: {start_str} -> {end_str}")
          
          def merge_with_image(video_path, image_path, output_path):
              filter_complex = (
                  f"[1:v]loop=loop=-1:size=1:start=0,setpts=PTS-STARTPTS,"
                  f"scale=1080:1920,setsar=1[img];"
                  f"[0:v]scale=1080:1920:force_original_aspect_ratio=decrease,"
                  f"pad=1080:1920:(ow-iw)/2:(oh-ih)/2[video];"
                  f"[img][video]overlay=0:0:shortest=1"
              )
              cmd = [
                  'ffmpeg', '-y',
                  '-i', video_path,
                  '-i', image_path,
                  '-filter_complex', filter_complex,
                  '-c:v', 'libx264',
                  '-preset', 'ultrafast',
                  '-crf', '28',
                  '-c:a', 'aac',
                  '-b:a', '96k',
                  '-shortest',
                  '-loglevel', 'error',
                  output_path
              ]
              return run_command(cmd, "Merge failed")
          
          def remove_silence(input_path, output_path):
              try:
                  import webrtcvad
                  import wave
              except:
                  shutil.copy2(input_path, output_path)
                  return True
              
              temp_dir = tempfile.mkdtemp()
              temp_audio = os.path.join(temp_dir, "audio.wav")
              
              run_command([
                  'ffmpeg', '-y', '-i', input_path,
                  '-ar', '16000', '-ac', '1',
                  '-loglevel', 'quiet',
                  temp_audio
              ])
              
              if not os.path.exists(temp_audio):
                  shutil.rmtree(temp_dir)
                  return False
              
              vad = webrtcvad.Vad(3)
              
              with wave.open(temp_audio, 'rb') as wav:
                  rate = wav.getframerate()
                  frames = wav.readframes(wav.getnframes())
              
              frame_duration = 30
              frame_size = int(rate * frame_duration / 1000) * 2
              
              segments = []
              speech = False
              start_time = 0.0
              
              for i in range(0, len(frames) - frame_size, frame_size):
                  try:
                      is_speech = vad.is_speech(frames[i:i+frame_size], rate)
                      current_time = i / (rate * 2)
                      
                      if is_speech and not speech:
                          speech = True
                          start_time = max(0, current_time - 0.3)
                      elif not is_speech and speech:
                          speech = False
                          segments.append((start_time, current_time + 0.3))
                  except:
                      continue
              
              if speech:
                  segments.append((start_time, len(frames) / (rate * 2)))
              
              if not segments:
                  shutil.copy2(input_path, output_path)
                  shutil.rmtree(temp_dir)
                  return True
              
              merged_segs = [segments[0]]
              for seg in segments[1:]:
                  if seg[0] - merged_segs[-1][1] <= 0.5:
                      merged_segs[-1] = (merged_segs[-1][0], seg[1])
                  else:
                      merged_segs.append(seg)
              
              concat_file = os.path.join(temp_dir, "concat.txt")
              segment_files = []
              
              for i, (s, e) in enumerate(merged_segs):
                  if e - s < 0.5:
                      continue
                  seg_file = os.path.join(temp_dir, f"seg_{i:03d}.mp4")
                  run_command([
                      'ffmpeg', '-y',
                      '-i', input_path,
                      '-ss', str(s),
                      '-to', str(e),
                      '-c', 'copy',
                      '-loglevel', 'quiet',
                      seg_file
                  ])
                  if os.path.exists(seg_file) and os.path.getsize(seg_file) > 0:
                      segment_files.append(seg_file)
              
              if not segment_files:
                  shutil.copy2(input_path, output_path)
                  shutil.rmtree(temp_dir)
                  return True
              
              with open(concat_file, 'w') as f:
                  for seg in segment_files:
                      f.write(f"file '{seg}'\n")
              
              success = run_command([
                  'ffmpeg', '-y',
                  '-f', 'concat', '-safe', '0',
                  '-i', concat_file,
                  '-c', 'copy',
                  '-loglevel', 'quiet',
                  output_path
              ])
              
              shutil.rmtree(temp_dir)
              return success
          
          def compress_video(input_path, output_path, target_size_mb=45):
              cmd = [
                  'ffmpeg', '-y',
                  '-i', input_path,
                  '-c:v', 'libx264',
                  '-preset', 'ultrafast',
                  '-crf', '35',
                  '-c:a', 'aac',
                  '-b:a', '48k',
                  '-fs', f'{target_size_mb}M',
                  '-loglevel', 'error',
                  output_path
              ]
              return run_command(cmd, "Compression failed")
          
          # ======================================================================
          # المرحلة 4: معالجة وإرسال المقاطع
          # ======================================================================
          print("\n" + "="*60)
          print("🔄 المرحلة 4: معالجة وإرسال المقاطع")
          print("="*60)
          
          async def process_and_send():
              client = TelegramClient('telethon_session', API_ID, API_HASH)
              await client.start(bot_token=BOT_TOKEN)
              
              try:
                  target = await client.get_entity(TELEGRAM_TARGET)
                  print(f"✅ Connected to target")
              except:
                  try:
                      target = int(TELEGRAM_TARGET)
                  except:
                      print(f"❌ Invalid target: {TELEGRAM_TARGET}")
                      await client.disconnect()
                      return
              
              # إرسال رسالة بدء المعالجة
              start_msg = (
                  f"🎬 **بدء معالجة المقاطع**\n\n"
                  f"📊 إجمالي المقاطع: {len(matches)}\n"
                  f"⏳ جاري المعالجة والإرسال..."
              )
              await client.send_message(target, start_msg)
              
              sent_count = 0
              failed_count = 0
              
              for idx, match in enumerate(matches):
                  start_str, end_str, title = match
                  start_sec = time_to_seconds(start_str)
                  end_sec = time_to_seconds(end_str)
                  
                  if end_sec <= start_sec:
                      print(f"⚠️ Skipping: {start_str} -> {end_str}")
                      continue
                  
                  duration_min = (end_sec - start_sec) / 60
                  
                  print(f"\n{'='*50}")
                  print(f"📹 {idx+1}/{len(matches)}: {title}")
                  print(f"   ⏱️ {start_str} -> {end_str} ({duration_min:.1f} دقيقة)")
                  
                  clip_temp = tempfile.mkdtemp(dir=TEMP_DIR)
                  
                  try:
                      # قص
                      print("  ✂️ قص...")
                      clip_path = os.path.join(clip_temp, f"clip_{idx+1}.mp4")
                      if not cut_clip(start_str, end_str, clip_path):
                          failed_count += 1
                          continue
                      print(f"  ✅ ({os.path.getsize(clip_path)/1024/1024:.1f} MB)")
                      
                      # صورة
                      print("  🖼️ صورة...")
                      image_path = os.path.join(clip_temp, f"thumb_{idx+1}.png")
                      if create_thumbnail(title, image_path):
                          # دمج
                          print("  🎬 دمج...")
                          merged_path = os.path.join(clip_temp, f"merged_{idx+1}.mp4")
                          if not merge_with_image(clip_path, image_path, merged_path):
                              merged_path = clip_path
                          else:
                              print(f"  ✅ ({os.path.getsize(merged_path)/1024/1024:.1f} MB)")
                      else:
                          merged_path = clip_path
                      
                      # إزالة سكوت
                      print("  🔇 سكوت...")
                      final_path = os.path.join(clip_temp, f"final_{idx+1}.mp4")
                      if not remove_silence(merged_path, final_path):
                          final_path = merged_path
                      else:
                          print(f"  ✅ ({os.path.getsize(final_path)/1024/1024:.1f} MB)")
                      
                      # إرسال
                      print("  📤 إرسال...")
                      caption = (
                          f"**{title}**\n"
                          f"📌 {idx+1}/{len(matches)}\n"
                          f"⏱️ {start_str} → {end_str} ({duration_min:.1f} دقيقة)"
                      )
                      
                      try:
                          await client.send_file(
                              target,
                              final_path,
                              caption=caption,
                              supports_streaming=True
                          )
                          sent_count += 1
                          print("  ✅ تم!")
                          
                      except Exception as e:
                          error_msg = str(e)
                          if "too big" in error_msg.lower() or "large" in error_msg.lower():
                              print("  🔄 ضغط...")
                              compressed_path = os.path.join(clip_temp, f"comp_{idx+1}.mp4")
                              if compress_video(final_path, compressed_path):
                                  try:
                                      await client.send_file(
                                          target,
                                          compressed_path,
                                          caption=caption + "\n(نسخة مضغوطة)",
                                          supports_streaming=True
                                      )
                                      sent_count += 1
                                      print("  ✅ تم!")
                                  except:
                                      failed_count += 1
                                      print("  ❌ فشل")
                              else:
                                  failed_count += 1
                          else:
                              failed_count += 1
                              print(f"  ❌ {error_msg[:100]}")
                      
                      # تحديث كل 5 مقاطع
                      if (idx + 1) % 5 == 0:
                          await client.send_message(
                              target,
                              f"📊 **تقدم:** {idx+1}/{len(matches)}\n✅ {sent_count} | ❌ {failed_count}"
                          )
                      
                  finally:
                      shutil.rmtree(clip_temp, ignore_errors=True)
                  
                  await asyncio.sleep(2)
              
              # نهائي
              await client.send_message(
                  target,
                  f"✅ **اكتملت المعالجة!**\n\n"
                  f"📊 {len(matches)} مقطع\n"
                  f"✅ {sent_count} تم | ❌ {failed_count} فشل\n"
                  f"🔗 [الفيديو]({YOUTUBE_URL})"
              )
              await client.disconnect()
          
          asyncio.run(process_and_send())
          
          # ======================================================================
          # تنظيف
          # ======================================================================
          print("\n🧹 تنظيف...")
          for f in [VIDEO_FILENAME, SRT_FILENAME, TIMESTAMPS_FILENAME, COOKIES_FILE]:
              if os.path.exists(f):
                  os.remove(f)
          shutil.rmtree(TEMP_DIR, ignore_errors=True)
          print("✅ تم!")
