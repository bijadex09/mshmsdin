name: Full Video Processing Pipeline

on:
  workflow_dispatch:
    inputs:
      youtube_url:
        description: 'YouTube Video URL'
        required: true
        default: 'https://www.youtube.com/live/R36qfvXK3XQ'
      telegram_user_id:
        description: 'Target Telegram User/Chat ID'
        required: true
        default: '-1004447957881'

jobs:
  full_pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          pip install yt-dlp telethon requests Pillow webrtcvad

      - name: Download cookies file
        run: |
          curl -L -o cookies.txt "https://raw.githubusercontent.com/bijadex09/mshmsdin/main/cookies.txt"
          if [ -f cookies.txt ] && [ -s cookies.txt ]; then
            echo "✅ Cookies file downloaded ($(wc -l < cookies.txt) lines)"
          else
            echo "⚠️ Failed to download cookies file or file is empty"
            echo "" > cookies.txt
          fi

      - name: Run Full Processing Pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          YOUTUBE_URL: ${{ github.event.inputs.youtube_url }}
          TELEGRAM_TARGET: ${{ github.event.inputs.telegram_user_id }}
        shell: python
        run: |
          import os
          import re
          import subprocess
          import json
          import asyncio
          import requests
          import tempfile
          import shutil
          import sys
          import glob
          from pathlib import Path
          from PIL import Image, ImageDraw, ImageFont
          from telethon import TelegramClient
          
          # ======================================================================
          # الإعدادات والثوابت
          # ======================================================================
          API_ID = 24629594
          API_HASH = "a79fa760e65af09a85eb2cc97cb2263c"
          BOT_TOKEN = "8248329215:AAGl3C96vZQ0B9VuDTX2m7IQt--WHDXJmFI"
          
          GEMINI_API_KEY = os.environ['GEMINI_API_KEY']
          YOUTUBE_URL = os.environ['YOUTUBE_URL']
          TELEGRAM_TARGET = os.environ['TELEGRAM_TARGET']
          
          COOKIES_FILE = 'cookies.txt'
          VIDEO_FILENAME = 'downloaded_video.mp4'
          SRT_FILENAME = 'subtitles.srt'
          TIMESTAMPS_FILENAME = 'timestamps.txt'
          
          TEMP_DIR = tempfile.mkdtemp(prefix='video_processing_')
          
          print(f"🎯 Target: {TELEGRAM_TARGET}")
          print(f"📺 Video: {YOUTUBE_URL}")
          
          # التحقق من ملف الكوكيز
          if os.path.exists(COOKIES_FILE):
              cookie_size = os.path.getsize(COOKIES_FILE)
              print(f"📄 Cookies file size: {cookie_size} bytes")
              with open(COOKIES_FILE, 'r') as f:
                  first_line = f.readline().strip()
              print(f"📄 First line: {first_line[:100]}")
          else:
              print("⚠️ No cookies file found!")
          
          # ======================================================================
          # الدوال المساعدة
          # ======================================================================
          def run_command(cmd, error_message="Command failed", show_stderr=False):
              print(f"  🏃 {' '.join(cmd[:6])}...")
              try:
                  result = subprocess.run(cmd, capture_output=True, text=True, timeout=300)
                  if result.returncode != 0:
                      print(f"  ⚠️ {error_message}")
                      if show_stderr and result.stderr:
                          lines = result.stderr.split('\n')
                          important_lines = [l for l in lines if 'WARNING' not in l and 'warning' not in l.lower()]
                          if important_lines:
                              print(f"  {important_lines[-1][:200]}")
                      return False
                  return True
              except subprocess.TimeoutExpired:
                  print(f"  ⚠️ Timeout: {error_message}")
                  return False
          
          def time_to_seconds(time_str):
              if not time_str: return 0
              parts = list(map(int, time_str.strip().split(':')))
              if len(parts) == 2:
                  return parts[0] * 60 + parts[1]
              elif len(parts) == 3:
                  return parts[0] * 3600 + parts[1] * 60 + parts[2]
              return 0
          
          def sanitize_filename(title):
              safe = "".join(c for c in title if c.isalnum() or c == ' ' or c in '_-')
              safe = safe.replace(' ', '_')
              return safe[:80]
          
          def send_telegram_message(message):
              """إرسال رسالة تنبيه إلى تلجرام"""
              try:
                  async def send():
                      client = TelegramClient('notify_session', API_ID, API_HASH)
                      await client.start(bot_token=BOT_TOKEN)
                      try:
                          target = int(TELEGRAM_TARGET)
                      except:
                          target = TELEGRAM_TARGET
                      await client.send_message(target, message, link_preview=False)
                      await client.disconnect()
                  asyncio.run(send())
              except Exception as e:
                  print(f"  ⚠️ Could not send Telegram notification: {str(e)[:100]}")
          
          # ======================================================================
          # المرحلة 1: تحميل الترجمة
          # ======================================================================
          print("\n" + "="*60)
          print("📥 المرحلة 1: تحميل الترجمة (SRT)")
          print("="*60)
          
          srt_downloaded = False
          
          # خيارات yt-dlp الأساسية
          ytdlp_base_options = [
              '--no-playlist',
              '--no-check-certificates',
              '--geo-bypass',
              '--no-warnings',
              '--extractor-retries', '5',
              '--retries', '5',
              '--sleep-requests', '2',
              '--sleep-interval', '3',
              '--max-sleep-interval', '5',
          ]
          
          # تحميل الترجمة
          print("🔄 تحميل الترجمة التلقائية العربية...")
          cmd = [
              'yt-dlp',
              '--cookies', COOKIES_FILE,
              '--write-auto-subs',
              '--sub-langs', 'ar',
              '--convert-subs', 'srt',
              '--skip-download',
              '--output', '%(title)s',
          ] + ytdlp_base_options + [YOUTUBE_URL]
          
          run_command(cmd, "Auto subs download attempt finished")
          
          # البحث عن ملفات SRT
          for f in glob.glob('*.ar.srt') + glob.glob('*.srt'):
              if os.path.exists(f):
                  os.rename(f, SRT_FILENAME)
                  srt_downloaded = True
                  print(f"✅ Found SRT: {f}")
                  break
          
          # إذا لم نجد، جرب ترجمة يدوية
          if not srt_downloaded:
              print("🔄 محاولة الترجمة اليدوية...")
              cmd = [
                  'yt-dlp',
                  '--cookies', COOKIES_FILE,
                  '--write-subs',
                  '--sub-langs', 'ar',
                  '--convert-subs', 'srt',
                  '--skip-download',
                  '--output', '%(title)s',
              ] + ytdlp_base_options + [YOUTUBE_URL]
              
              run_command(cmd, "Manual subs download attempt finished")
              
              for f in glob.glob('*.ar.srt') + glob.glob('*.srt'):
                  if os.path.exists(f):
                      os.rename(f, SRT_FILENAME)
                      srt_downloaded = True
                      print(f"✅ Found SRT: {f}")
                      break
          
          # محاولة أخيرة مع extractor args
          if not srt_downloaded:
              print("🔄 محاولة مع player_client=android...")
              cmd = [
                  'yt-dlp',
                  '--cookies', COOKIES_FILE,
                  '--extractor-args', 'youtube:player_client=android,web',
                  '--write-auto-subs',
                  '--sub-langs', 'ar',
                  '--convert-subs', 'srt',
                  '--skip-download',
                  '--output', '%(title)s',
              ] + ytdlp_base_options + [YOUTUBE_URL]
              
              run_command(cmd, "Extractor args attempt finished")
              
              for f in glob.glob('*.ar.srt') + glob.glob('*.srt'):
                  if os.path.exists(f):
                      os.rename(f, SRT_FILENAME)
                      srt_downloaded = True
                      print(f"✅ Found SRT: {f}")
                      break
          
          if not srt_downloaded:
              print("\n❌ فشل تحميل الترجمة!")
              error_msg = (
                  "❌ **فشل تحميل الترجمة**\n\n"
                  + "🔗 [الفيديو](" + YOUTUBE_URL + ")\n"
                  + "⚠️ لم يتم العثور على ترجمة عربية\n\n"
                  + "📝 **الحلول:**\n"
                  + "• تأكد من وجود ترجمة عربية للفيديو\n"
                  + "• قم بتحديث ملف الكوكيز\n"
                  + "• جرب فيديو آخر"
              )
              send_telegram_message(error_msg)
              sys.exit(1)
          
          # قراءة الترجمة
          with open(SRT_FILENAME, 'r', encoding='utf-8') as f:
              srt_content = f.read()
          
          srt_len = len(srt_content)
          print(f"✅ تم تحميل الترجمة ({srt_len} حرف)")
          
          # ======================================================================
          # المرحلة 2: تحليل مع Gemini
          # ======================================================================
          print("\n" + "="*60)
          print("🤖 المرحلة 2: تحليل مع Gemini Flash")
          print("="*60)
          
          prompt = f"""
          الوثيقة هي نص تفريغ فيديو عربي لجلسة أسئلة وأجوبة دينية. النص منسق كـ 'HH:MM:SS | النص'.
          
          مهمتك: استخراج جميع الأسئلة والإجابات بدقة، مع تحديد وقت بداية السؤال ووقت نهاية الإجابة لكل مسألة.
          
          **معايير تحديد بداية السؤال (START_TIME):**
          1. ابحث عن الكلمات المفتاحية: 'سؤال'، 'يسأل'، 'أريد أن أسأل'، 'ما حكم'، 'هل يجوز'، 'ما رأيك'
          2. ابحث عن صيغ الاستفهام: 'هل'، 'متى'، 'كيف'، 'لماذا'، 'أين'
          3. ابحث عن انتقال المتحدث من الحديث العام إلى سؤال محدد
          4. ابدأ من أول كلمة للسؤال، وليس من رد المحاضر
          
          **معايير تحديد نهاية الإجابة (END_TIME):**
          1. تنتهي الإجابة عندما ينتقل المتحدث إلى سؤال جديد أو موضوع مختلف تماماً
          2. تنتهي عندما يقول المتحدث كلمات مثل: 'هذا والله أعلم'، 'انتهى'، 'ننتقل للسؤال التالي'
          3. تنتهي عندما يبدأ السائل بسؤال جديد أو يعود المتحدث للرد على سائل آخر
          4. لا تقطع الإجابة في منتصفها - تأكد من تغطية كامل الرد على السؤال
          
          **تنسيق الإخراج الإلزامي:**
          • [START_TIME] | [END_TIME] | [العنوان]
          • [START_TIME] | [END_TIME] | [العنوان]
          
          **قواعد الأوقات:**
          1. للأوقات أقل من ساعة: استخدم تنسيق MM:SS فقط
          2. للأوقات أكثر من ساعة: استخدم تنسيق HH:MM:SS
          
          **قواعد العناوين:**
          1. سؤال مختصر لا يتجاوز 10 كلمات
          2. استخدم صيغة السؤال: 'حكم كذا؟'، 'هل يجوز كذا؟'
          
          ابدأ الإخراج مباشرة دون أي مقدمة أو شرح.
          
          {srt_content}
          """
          
          headers = {
              'Content-Type': 'application/json',
              'X-goog-api-key': GEMINI_API_KEY,
          }
          
          data = {
              "contents": [{
                  "parts": [{"text": prompt}]
              }],
              "generationConfig": {
                  "temperature": 0.1,
                  "maxOutputTokens": 8192,
              }
          }
          
          print("📤 إرسال إلى Gemini...")
          
          try:
              response = requests.post(
                  "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent",
                  headers=headers,
                  json=data,
                  timeout=120
              )
              
              if response.status_code != 200:
                  print(f"❌ Gemini API Error: {response.status_code}")
                  error_msg = "❌ فشل تحليل الترجمة - خطأ في Gemini API: " + str(response.status_code)
                  send_telegram_message(error_msg)
                  sys.exit(1)
              
              result = response.json()
              timestamps_text = result['candidates'][0]['content']['parts'][0]['text']
              
          except Exception as e:
              error_str = str(e)
              print(f"❌ Gemini error: {error_str[:200]}")
              error_msg = "❌ فشل تحليل الترجمة: " + error_str[:200]
              send_telegram_message(error_msg)
              sys.exit(1)
          
          # حفظ المواقيت
          with open(TIMESTAMPS_FILENAME, 'w', encoding='utf-8') as f:
              f.write(timestamps_text)
          
          print("✅ تم استخراج المواقيت:")
          print(timestamps_text[:500])
          
          # تحليل المواقيت
          timestamp_pattern = r'•\s*([\d:]+)\s*\|\s*([\d:]+)\s*\|\s*(.*)'
          matches = re.findall(timestamp_pattern, timestamps_text)
          
          if not matches:
              print("\n❌ لا توجد مواقيت صالحة!")
              preview = timestamps_text[:300]
              print("النص المستخرج: " + preview)
              error_msg = "❌ فشل استخراج المواقيت\nالنص المستخرج:\n" + preview
              send_telegram_message(error_msg)
              sys.exit(1)
          
          matches_count = len(matches)
          print(f"\n✅ تم استخراج {matches_count} مقطع بنجاح!")
          
          # ======================================================================
          # المرحلة 3: تحميل الفيديو
          # ======================================================================
          print("\n" + "="*60)
          print("📥 المرحلة 3: تحميل الفيديو")
          print("="*60)
          
          start_msg = "✅ تم تحليل " + str(matches_count) + " مقطع\n📥 جاري تحميل الفيديو..."
          send_telegram_message(start_msg)
          
          video_downloaded = False
          
          print("🔄 تحميل الفيديو...")
          cmd = [
              'yt-dlp',
              '--cookies', COOKIES_FILE,
              '--live-from-start',
              '--output', VIDEO_FILENAME,
          ] + ytdlp_base_options + [YOUTUBE_URL]
          
          video_downloaded = run_command(cmd, "Video download failed", show_stderr=True)
          
          if not video_downloaded:
              print("🔄 محاولة مع player_client=android...")
              cmd = [
                  'yt-dlp',
                  '--cookies', COOKIES_FILE,
                  '--extractor-args', 'youtube:player_client=android',
                  '--live-from-start',
                  '--output', VIDEO_FILENAME,
              ] + ytdlp_base_options + [YOUTUBE_URL]
              video_downloaded = run_command(cmd, "Retry failed", show_stderr=True)
          
          if not video_downloaded or not os.path.exists(VIDEO_FILENAME):
              print("❌ فشل تحميل الفيديو!")
              send_telegram_message("❌ فشل تحميل الفيديو بعد استخراج المواقيت")
              sys.exit(1)
          
          video_size = os.path.getsize(VIDEO_FILENAME) / (1024*1024)
          print(f"✅ تم تحميل الفيديو ({video_size:.1f} MB)")
          
          # ======================================================================
          # دوال المعالجة
          # ======================================================================
          def create_thumbnail(title, output_path):
              width, height = 1080, 1920
              image = Image.new('RGB', (width, height), color='#1a1a2e')
              draw = ImageDraw.Draw(image)
              for i in range(height):
                  r = int(26 + (i/height) * 30)
                  g = int(26 + (i/height) * 20)
                  b = int(46 + (i/height) * 40)
                  draw.line([(0, i), (width, i)], fill=(r, g, b))
              try:
                  font_paths = ["/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf"]
                  font = None
                  for fp in font_paths:
                      if os.path.exists(fp):
                          font = ImageFont.truetype(fp, 50)
                          break
                  if not font: font = ImageFont.load_default()
              except: font = ImageFont.load_default()
              words = title.split()
              lines, current = [], ""
              for w in words:
                  t = current + " " + w if current else w
                  if len(t) <= 22: current = t
                  else:
                      if current: lines.append(current)
                      current = w
              if current: lines.append(current)
              if not lines: lines = [title]
              y = height // 3
              for line in lines:
                  bbox = draw.textbbox((0, 0), line, font=font)
                  tw, th = bbox[2]-bbox[0], bbox[3]-bbox[1]
                  x = (width - tw) // 2
                  draw.text((x+3, y+3), line, font=font, fill='#00000080')
                  draw.text((x, y), line, font=font, fill='white')
                  y += th + 30
              for i in range(5): draw.rectangle([i, i, width-i-1, height-i-1], outline='#e94560')
              image.save(output_path, 'PNG', quality=95)
              return True
          
          def cut_clip(s, e, out):
              return run_command(['ffmpeg', '-y', '-i', VIDEO_FILENAME, '-ss', s, '-to', e, '-c', 'copy', '-loglevel', 'error', out])
          
          def merge_with_image(v, i, out):
              fc = f"[1:v]loop=loop=-1:size=1:start=0,setpts=PTS-STARTPTS,scale=1080:1920,setsar=1[img];[0:v]scale=1080:1920:force_original_aspect_ratio=decrease,pad=1080:1920:(ow-iw)/2:(oh-ih)/2[video];[img][video]overlay=0:0:shortest=1"
              return run_command(['ffmpeg', '-y', '-i', v, '-i', i, '-filter_complex', fc, '-c:v', 'libx264', '-preset', 'ultrafast', '-crf', '28', '-c:a', 'aac', '-b:a', '96k', '-shortest', '-loglevel', 'error', out])
          
          def remove_silence(inp, out):
              try:
                  import webrtcvad, wave
              except:
                  shutil.copy2(inp, out)
                  return True
              td = tempfile.mkdtemp()
              ta = os.path.join(td, "a.wav")
              run_command(['ffmpeg', '-y', '-i', inp, '-ar', '16000', '-ac', '1', '-loglevel', 'quiet', ta])
              if not os.path.exists(ta): shutil.rmtree(td); return False
              vad = webrtcvad.Vad(3)
              with wave.open(ta, 'rb') as w: rate, frames = w.getframerate(), w.readframes(w.getnframes())
              fs = int(rate*30/1000)*2
              segs, sp, st = [], False, 0.0
              for i in range(0, len(frames)-fs, fs):
                  try:
                      iss = vad.is_speech(frames[i:i+fs], rate)
                      ct = i/(rate*2)
                      if iss and not sp: sp, st = True, max(0, ct-0.3)
                      elif not iss and sp: sp = False; segs.append((st, ct+0.3))
                  except: continue
              if sp: segs.append((st, len(frames)/(rate*2)))
              if not segs: shutil.copy2(inp, out); shutil.rmtree(td); return True
              ms = [segs[0]]
              for s in segs[1:]:
                  if s[0]-ms[-1][1] <= 0.5: ms[-1] = (ms[-1][0], s[1])
                  else: ms.append(s)
              cf = os.path.join(td, "c.txt"); sfs = []
              for i, (s, e) in enumerate(ms):
                  if e-s < 0.5: continue
                  sf = os.path.join(td, f"s{i:03d}.mp4")
                  run_command(['ffmpeg', '-y', '-i', inp, '-ss', str(s), '-to', str(e), '-c', 'copy', '-loglevel', 'quiet', sf])
                  if os.path.exists(sf) and os.path.getsize(sf)>0: sfs.append(sf)
              if not sfs: shutil.copy2(inp, out); shutil.rmtree(td); return True
              with open(cf, 'w') as f:
                  for s in sfs: f.write(f"file '{s}'\n")
              ok = run_command(['ffmpeg', '-y', '-f', 'concat', '-safe', '0', '-i', cf, '-c', 'copy', '-loglevel', 'quiet', out])
              shutil.rmtree(td)
              return ok
          
          def compress_video(inp, out, ts=45):
              return run_command(['ffmpeg', '-y', '-i', inp, '-c:v', 'libx264', '-preset', 'ultrafast', '-crf', '35', '-c:a', 'aac', '-b:a', '48k', '-fs', str(ts)+'M', '-loglevel', 'error', out])
          
          # ======================================================================
          # معالجة وإرسال المقاطع
          # ======================================================================
          print("\n" + "="*60)
          print("🔄 معالجة وإرسال المقاطع")
          print("="*60)
          
          async def process_and_send():
              client = TelegramClient('ts', API_ID, API_HASH)
              await client.start(bot_token=BOT_TOKEN)
              try: target = int(TELEGRAM_TARGET)
              except: target = TELEGRAM_TARGET
              
              total = len(matches)
              await client.send_message(target, "🎬 بدء معالجة " + str(total) + " مقطع...")
              
              sent, failed = 0, 0
              for idx, (ss, es, title) in enumerate(matches):
                  ssec, esec = time_to_seconds(ss), time_to_seconds(es)
                  if esec <= ssec: continue
                  dm = (esec-ssec)/60
                  print(f"\n📹 {idx+1}/{total}: {title} ({dm:.1f}m)")
                  
                  ct = tempfile.mkdtemp(dir=TEMP_DIR)
                  try:
                      cp = os.path.join(ct, "c.mp4")
                      if not cut_clip(ss, es, cp): failed += 1; continue
                      
                      ip = os.path.join(ct, "t.png")
                      mp = cp
                      if create_thumbnail(title, ip):
                          mp2 = os.path.join(ct, "m.mp4")
                          if merge_with_image(cp, ip, mp2): mp = mp2
                      
                      fp = os.path.join(ct, "f.mp4")
                      if not remove_silence(mp, fp): fp = mp
                      
                      cap = "**" + title + "**\n📌 " + str(idx+1) + "/" + str(total) + "\n⏱️ " + ss + "→" + es + " (" + f"{dm:.1f}" + "m)"
                      try:
                          await client.send_file(target, fp, caption=cap, supports_streaming=True)
                          sent += 1
                          print("✅ Sent!")
                      except Exception as e:
                          err_str = str(e)
                          if "too big" in err_str.lower():
                              comp = os.path.join(ct, "comp.mp4")
                              if compress_video(fp, comp):
                                  try:
                                      await client.send_file(target, comp, caption=cap+"\n(مضغوط)", supports_streaming=True)
                                      sent += 1
                                  except: failed += 1
                              else: failed += 1
                          else: failed += 1
                      
                      if (idx+1)%5 == 0:
                          progress = "📊 " + str(idx+1) + "/" + str(total) + " | ✅" + str(sent) + " ❌" + str(failed)
                          await client.send_message(target, progress)
                  finally:
                      shutil.rmtree(ct, ignore_errors=True)
                  await asyncio.sleep(2)
              
              final_msg = "✅ تم!\n📊 " + str(total) + " مقطع\n✅" + str(sent) + " ❌" + str(failed)
              await client.send_message(target, final_msg)
              await client.disconnect()
          
          asyncio.run(process_and_send())
          
          # تنظيف
          for f in [VIDEO_FILENAME, SRT_FILENAME, TIMESTAMPS_FILENAME, COOKIES_FILE]:
              if os.path.exists(f): os.remove(f)
          shutil.rmtree(TEMP_DIR, ignore_errors=True)
          print("\n✅ تم!")
