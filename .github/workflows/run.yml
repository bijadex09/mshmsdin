name: YouTube Video Downloader Only

on:
  workflow_dispatch:
    inputs:
      youtube_url:
        description: 'YouTube Video URL'
        required: true
        default: 'https://www.youtube.com/live/R36qfvXK3XQ'
      telegram_target:
        description: 'Telegram Channel/User ID'
        required: true
        default: '-1004447957881'

jobs:
  process:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup System Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg
          pip install yt-dlp telethon requests Pillow webrtcvad
          pip install --upgrade yt-dlp

      - name: Download Cookies
        run: |
          curl -sL "https://raw.githubusercontent.com/bijadex09/mshmsdin/main/cookies.txt" -o cookies.txt

      - name: Download Video Only
        env:
          YT_URL: ${{ github.event.inputs.youtube_url }}
          TG_TARGET: ${{ github.event.inputs.telegram_target }}
        shell: python
        run: |
          import os, sys, yt_dlp, requests

          BOT_TOKEN = "8248329215:AAGl3C96vZQ0B9VuDTX2m7IQt--WHDXJmFI"
          YT_URL = os.environ['YT_URL']
          TG_TARGET = os.environ['TG_TARGET']
          VIDEO = 'video.mp4'
          COOKIES = 'cookies.txt'

          def tg_msg(text):
              try:
                  url = f"https://api.telegram.org/bot{BOT_TOKEN}/sendMessage"
                  requests.post(url, json={"chat_id": int(TG_TARGET), "text": text}, timeout=10)
              except: pass

          print("\n📥 Downloading video directly...")
          tg_msg("📥 جاري بدء تحميل الفيديو مباشرة...")

          opts = {
              'format': 'b/best/bestvideo+bestaudio', 
              'outtmpl': VIDEO, 
              'quiet': False,
              'cookiefile': COOKIES if os.path.exists(COOKIES) else None, 
              'live_from_start': True,
              'ignoreerrors': True
          }
          
          try:
              with yt_dlp.YoutubeDL(opts) as ydl:
                  ydl.download([YT_URL])
          except Exception as e:
              print(f"⚠️ Initial download try failed: {e}")
              opts['cookiefile'] = None
              with yt_dlp.YoutubeDL(opts) as ydl:
                  ydl.download([YT_URL])

          if os.path.isfile(VIDEO) and os.path.getsize(VIDEO) > 0:
              size_mb = os.path.getsize(VIDEO) / (1024 * 1024)
              print(f"✅ Download successful! File size: {size_mb:.2f} MB")
              tg_msg(f"✅ تم تحميل الفيديو بنجاح واكتمال حفظه!\n📦 الحجم: {size_mb:.2f} ميجابايت.\n\nبانتظار توجيهاتك القادمة...")
          else:
              print("❌ Download failed!")
              tg_msg("❌ فشل تحميل الفيديو، يرجى التحقق من الرابط أو الكوكيز.")
              sys.exit(1)
