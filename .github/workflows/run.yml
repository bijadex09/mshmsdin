name: YouTube Ultimate QA Extractor - Daily Schedule

on:
  schedule:
    # يعمل كل يوم في الساعة 00:00 (12 منتصف الليل) بالتوقيت العالمي UTC
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      telegram_target:
        description: 'Telegram Channel/User ID'
        required: true
        default: '-1004447957881'

jobs:
  process-single-video:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup System Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg fontconfig build-essential python3-dev
          npm install -g sharp-cli
          pip install yt-dlp requests webrtcvad-wheels telethon google-auth google-auth-oauthlib google-auth-httplib2 google-api-python-client
          pip install --upgrade pip
          pip install --upgrade yt-dlp

      - name: Process Single Video
        env:
          TG_TARGET: ${{ secrets.TELEGRAM_TARGET }}
          COOKIES_TEXT: ${{ secrets.COOKIES_TEXT }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_NAME: ${{ github.repository }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        shell: python
        run: |
          import os
          import sys
          import wave
          import shutil
          import tempfile
          import subprocess
          import requests
          import json
          import urllib.request
          import re
          import asyncio
          import datetime
          import base64
          from typing import List, Tuple
          from telethon import TelegramClient
          from googleapiclient.discovery import build
          from googleapiclient.http import MediaFileUpload
          from google.auth.transport.requests import Request as AuthRequest
          from google.oauth2.credentials import Credentials

          # ========== الإعدادات ==========
          BOT_TOKEN = "8248329215:AAGl3C96vZQ0B9VuDTX2m7IQt--WHDXJmFI"
          TELEGRAM_API_ID = 24629594
          TELEGRAM_API_HASH = "a79fa760e65af09a85eb2cc97cb2263c"
          TELEGRAM_BOT_TOKEN = "8853762125:AAEJeYtDufaLoQcq8ZbuHpuQ3R42WYJkBXo"
          
          TG_TARGET = os.environ.get('TG_TARGET', '')
          COOKIES_TEXT = os.environ.get('COOKIES_TEXT', '')
          GEMINI_KEY = os.environ.get('GEMINI_API_KEY', '')
          GITHUB_TOKEN = os.environ.get('GITHUB_TOKEN')
          REPO_NAME = os.environ.get('REPO_NAME')
          
          YOUTUBE_CLIENT_ID = os.environ.get('YOUTUBE_CLIENT_ID', '')
          YOUTUBE_CLIENT_SECRET = os.environ.get('YOUTUBE_CLIENT_SECRET', '')
          YOUTUBE_REFRESH_TOKEN = os.environ.get('YOUTUBE_REFRESH_TOKEN', '')
          
          VIDEOS_FILE_PATH = "videos.txt"
          SCHEDULE_FILE_PATH = "schedule.json"
          LOG_FILE_PATH = "processing_log.txt"
          BASE_DIR = os.getcwd()
          TEMP_VIDEO = os.path.join(BASE_DIR, "temp_video.mp4")
          COOKIES_FILE = os.path.join(BASE_DIR, "cookies.txt")
          SUB_OUTPUT = os.path.join(BASE_DIR, "sub_file")
          EXPECTED_VTT = os.path.join(BASE_DIR, "sub_file.ar.vtt")
          FINAL_TRANSCRIPT = os.path.join(BASE_DIR, "transcript.txt")

          # أوقات النشر (بالتوقيت العالمي UTC)
          PUBLISH_HOURS = [12, 15, 18, 21, 23]

          # إعدادات الصور والخطوط
          FONT_SYSTEM_DIR = os.path.expanduser("~/.local/share/fonts")
          IMAGES_CACHE_DIR = os.path.expanduser("~/.local/share/images")
          FONT_FULL_PATH = os.path.join(FONT_SYSTEM_DIR, "ReadexPro-Bold.ttf")
          BACKGROUND_SHORT_URL = "https://raw.githubusercontent.com/bidjadraft/markdown/refs/heads/main/images/background1.png"
          BACKGROUND_LONG_URL = "https://raw.githubusercontent.com/bidjadraft/markdown/refs/heads/main/images/background.png"
          FONT_URL = "https://raw.githubusercontent.com/bidjadraft/markdown/refs/heads/main/fonts/ReadexPro-Bold.ttf"
          
          os.makedirs(IMAGES_CACHE_DIR, exist_ok=True)
          os.makedirs(FONT_SYSTEM_DIR, exist_ok=True)
          CACHED_FONT = os.path.join(IMAGES_CACHE_DIR, "ReadexPro-Bold.ttf")
          CACHED_BG_SHORT = os.path.join(IMAGES_CACHE_DIR, "background1.png")
          CACHED_BG_LONG = os.path.join(IMAGES_CACHE_DIR, "background.png")

          # إعدادات المعالجة
          AUDIO_BITRATE = "96k"
          VIDEO_PRESET = "faster"
          VIDEO_CRF = 20
          SILENCE_THRESHOLD = 0.5
          VAD_AGGRESSIVENESS = 3
          START_OFFSET = -3
          END_OFFSET = 5
          TELEGRAM_LIMIT = 20 * 1024 * 1024

          # ========== دوال السجل ==========
          def log_message(msg):
              """تسجيل الرسائل في ملف السجل"""
              timestamp = datetime.datetime.now().strftime("%Y-%m-%d %H:%M:%S")
              log_entry = f"[{timestamp}] {msg}"
              print(log_entry)
              
              # حفظ في ملف السجل
              try:
                  with open(LOG_FILE_PATH, 'a', encoding='utf-8') as f:
                      f.write(log_entry + '\n')
              except:
                  pass

          # ========== دوال GitHub API ==========
          def get_github_headers():
              return {
                  "Authorization": f"Bearer {GITHUB_TOKEN}",
                  "Accept": "application/vnd.github.v3+json"
              }

          def get_first_url():
              """قراءة أول رابط فقط من ملف videos.txt"""
              url = f"https://api.github.com/repos/{REPO_NAME}/contents/{VIDEOS_FILE_PATH}"
              headers = get_github_headers()
              
              try:
                  response = requests.get(url, headers=headers)
                  if response.status_code == 200:
                      data = response.json()
                      content = base64.b64decode(data['content']).decode('utf-8')
                      urls = [line.strip() for line in content.splitlines() if line.strip()]
                      if urls:
                          log_message(f"✅ First URL: {urls[0]}")
                          log_message(f"📊 Total URLs remaining: {len(urls)}")
                          return urls[0], urls[1:], data['sha']
                      else:
                          log_message("✅ No URLs found in videos.txt")
                          return None, [], None
                  else:
                      log_message(f"❌ Failed to read videos.txt: {response.status_code}")
                      return None, [], None
              except Exception as e:
                  log_message(f"❌ Error: {e}")
                  return None, [], None

          def update_videos_file(remaining_urls, current_sha):
              """تحديث الملف بحذف الرابط الأول فقط"""
              if not current_sha:
                  return False
              
              url = f"https://api.github.com/repos/{REPO_NAME}/contents/{VIDEOS_FILE_PATH}"
              headers = get_github_headers()
              
              new_content = "\n".join(remaining_urls)
              if new_content and not new_content.endswith('\n'):
                  new_content += '\n'
              
              data = {
                  "message": f"Remove processed video. Remaining: {len(remaining_urls)}",
                  "content": base64.b64encode(new_content.encode()).decode(),
                  "sha": current_sha
              }
              
              try:
                  response = requests.put(url, headers=headers, json=data)
                  if response.status_code == 200:
                      log_message(f"✅ Removed URL from videos.txt. Remaining: {len(remaining_urls)}")
                      return True
                  else:
                      log_message(f"❌ Failed to update: {response.status_code}")
                      return False
              except Exception as e:
                  log_message(f"❌ Error: {e}")
                  return False

          # ========== التحقق من وجود ترجمة ==========
          def check_subtitles(youtube_url):
              """التحقق من وجود ترجمة عربية قبل تحميل الفيديو"""
              log_message("🔍 Checking for Arabic subtitles...")
              
              with open(COOKIES_FILE, "w") as f:
                  f.write(COOKIES_TEXT)
              
              # استخدام yt-dlp لفحص الترجمة فقط
              cmd = [
                  "yt-dlp", "--cookies", COOKIES_FILE,
                  "--list-subs", "--skip-download",
                  youtube_url
              ]
              
              try:
                  result = subprocess.run(cmd, capture_output=True, text=True)
                  output = result.stdout + result.stderr
                  
                  has_arabic = False
                  for line in output.split('\n'):
                      if 'ar' in line.lower() or 'arabic' in line.lower():
                          has_arabic = True
                          break
                  
                  # التحقق أيضاً من وجود ملف الترجمة التلقائية
                  test_cmd = [
                      "yt-dlp", "--cookies", COOKIES_FILE,
                      "--write-auto-sub", "--sub-lang", "ar",
                      "--skip-download", "--sub-format", "vtt",
                      "-o", SUB_OUTPUT, youtube_url
                  ]
                  subprocess.run(test_cmd, capture_output=True, text=True)
                  
                  if os.path.exists(EXPECTED_VTT):
                      has_arabic = True
                  
                  if has_arabic:
                      log_message("✅ Arabic subtitles found!")
                  else:
                      log_message("❌ No Arabic subtitles found for this video")
                  
                  return has_arabic
                  
              except Exception as e:
                  log_message(f"❌ Error checking subtitles: {e}")
                  return False
              finally:
                  if os.path.exists(COOKIES_FILE):
                      os.remove(COOKIES_FILE)

          # ========== دوال التحميل والمعالجة ==========
          def download_file(url, dest):
              if os.path.exists(dest): return True
              try: urllib.request.urlretrieve(url, dest); return True
              except: return False

          try:
              download_file(FONT_URL, CACHED_FONT)
              download_file(BACKGROUND_SHORT_URL, CACHED_BG_SHORT)
              download_file(BACKGROUND_LONG_URL, CACHED_BG_LONG)
              if not os.path.exists(FONT_FULL_PATH):
                  shutil.copy2(CACHED_FONT, FONT_FULL_PATH)
                  subprocess.run(['fc-cache', '-fv'], capture_output=True)
          except Exception as e: 
              log_message(f"⚠️ Assets warning: {e}")

          def get_duration(file_path: str) -> float:
              try:
                  cmd = ['ffprobe', '-v', 'error', '-show_entries', 'format=duration', '-of', 'default=noprint_wrappers=1:nokey=1', file_path]
                  result = subprocess.run(cmd, capture_output=True, text=True)
                  return float(result.stdout.strip()) if result.stdout.strip() else 0.0
              except: return 0.0

          def run_cmd(cmd):
              try:
                  result = subprocess.run(cmd, capture_output=True, text=True)
                  return result.returncode == 0
              except: return False

          def seconds_to_time(seconds: float) -> str:
              minutes = int(seconds // 60); secs = int(seconds % 60)
              if minutes >= 60: hours = minutes // 60; minutes = minutes % 60; return f"{hours:02d}:{minutes:02d}:{secs:02d}"
              return f"{minutes:02d}:{secs:02d}"

          def time_to_seconds(time_str: str) -> float:
              time_str = time_str.strip()
              if '.' in time_str: time_str = time_str.split('.')[0]
              parts = time_str.split(':')
              if len(parts) == 2: return int(parts[0]) * 60 + int(parts[1])
              elif len(parts) == 3: return int(parts[0]) * 3600 + int(parts[1]) * 60 + int(parts[2])
              return 0.0

          def adjust_timestamp(start_time: str, end_time: str, video_duration: float) -> Tuple[str, str]:
              start_sec = max(0, time_to_seconds(start_time) + START_OFFSET)
              end_sec = min(video_duration, time_to_seconds(end_time) + END_OFFSET)
              if end_sec <= start_sec: end_sec = start_sec + 1
              return seconds_to_time(start_sec), seconds_to_time(end_sec)

          def extract_clip(video_path: str, start: str, end: str, output_path: str) -> bool:
              return run_cmd(['ffmpeg', '-y', '-i', video_path, '-ss', start, '-to', end, '-c:v', 'libx264', '-preset', VIDEO_PRESET, '-crf', str(VIDEO_CRF), '-c:a', 'aac', '-b:a', AUDIO_BITRATE, '-loglevel', 'error', output_path])

          def remove_silence_from_video(input_path: str, output_path: str) -> Tuple[bool, float]:
              try:
                  import webrtcvad
                  vad = webrtcvad.Vad(VAD_AGGRESSIVENESS)
              except ImportError:
                  shutil.copy2(input_path, output_path); return True, 0.0
              
              orig_duration = get_duration(input_path)
              with tempfile.TemporaryDirectory() as temp_dir:
                  temp_audio = os.path.join(temp_dir, "audio.wav")
                  if not run_cmd(['ffmpeg', '-y', '-i', input_path, '-ar', '16000', '-ac', '1', temp_audio, '-loglevel', 'quiet']): return False, 0.0
                  
                  with wave.open(temp_audio, 'rb') as wav:
                      rate = wav.getframerate()
                      frames = wav.readframes(wav.getnframes())
                  
                  frame_size = int(rate * 30 / 1000) * 2
                  segments = []
                  speech = False
                  start_speech = 0.0
                  
                  for i in range(0, len(frames) - frame_size, frame_size):
                      try:
                          is_speech = vad.is_speech(frames[i:i+frame_size], rate)
                          current_time = i / (rate * 2)
                          if is_speech and not speech:
                              speech = True
                              start_speech = max(0, current_time - 0.2)
                          elif not is_speech and speech:
                              speech = False
                              segments.append((start_speech, current_time + 0.2))
                      except: continue
                  
                  if speech: segments.append((start_speech, len(frames) / (rate * 2)))
                  if not segments: return False, 0.0
                  
                  merged = []
                  cs, ce = segments[0]
                  for ns, ne in segments[1:]:
                      if ns - ce <= 0.5: ce = max(ce, ne)
                      else: merged.append((cs, ce)); cs, ce = ns, ne
                  merged.append((cs, ce))
                  
                  segment_files = []
                  for s, e in merged:
                      if e - s < 0.5: continue
                      seg_file = os.path.join(temp_dir, f"seg_{len(segment_files):03d}.mp4")
                      if run_cmd(['ffmpeg', '-y', '-ss', f"{s:.3f}", '-i', input_path, '-t', f"{e-s:.3f}", '-c:v', 'libx264', '-preset', VIDEO_PRESET, '-crf', str(VIDEO_CRF), '-c:a', 'aac', '-b:a', AUDIO_BITRATE, seg_file, '-loglevel', 'quiet']):
                          segment_files.append(seg_file)
                  
                  if not segment_files: return False, 0.0
                  
                  concat_file = os.path.join(temp_dir, "concat.txt")
                  with open(concat_file, 'w') as f:
                      for seg in segment_files: f.write(f"file '{seg}'\n")
                  
                  if run_cmd(['ffmpeg', '-y', '-f', 'concat', '-safe', '0', '-i', concat_file, '-c', 'copy', output_path, '-loglevel', 'quiet']):
                      return True, orig_duration - get_duration(output_path)
              return False, 0.0

          def get_single_line_font_size(word_count):
              if word_count <= 3: return 90
              elif word_count == 4: return 80
              elif word_count == 5: return 68
              else: return 57

          def create_image_with_title(text, output_path):
              word_count = len(text.strip().split())
              if word_count >= 7:
                  bg_image = CACHED_BG_LONG
                  font_size = 70
                  use_multiline = True
              else:
                  bg_image = CACHED_BG_SHORT
                  font_size = get_single_line_font_size(word_count)
                  use_multiline = False
              
              if not os.path.exists(bg_image):
                  fallback_bg = os.path.join(IMAGES_CACHE_DIR, "fallback_bg.png")
                  if not os.path.exists(fallback_bg):
                      subprocess.run(['ffmpeg', '-y', '-f', 'lavfi', '-i', 'color=c=black:s=1080x1920:d=1', '-frames:v', '1', fallback_bg], capture_output=True)
                  bg_to_use = fallback_bg
              else:
                  bg_to_use = bg_image
              
              if not use_multiline:
                  svg = f'<svg width="1080" height="1920"><defs><style>@font-face{{font-family:"Readex Pro";src:url("{FONT_FULL_PATH}");}}.title{{fill:white;font-family:"Readex Pro";font-size:{font_size}px;font-weight:bold;text-anchor:middle;}}</style></defs><text x="540" y="1390" class="title" direction="rtl">{text}</text></svg>'
              else:
                  words = text.strip().split()
                  half = (len(words) + 1) // 2
                  line1, line2 = " ".join(words[:half]), " ".join(words[half:])
                  svg = f'<svg width="1080" height="1920"><defs><style>@font-face{{font-family:"Readex Pro";src:url("{FONT_FULL_PATH}");}}.title{{fill:white;font-family:"Readex Pro";font-size:{font_size}px;font-weight:bold;text-anchor:middle;}}</style></defs><text x="540" y="1390" class="title" direction="rtl">{line1}</text><text x="540" y="1500" class="title" direction="rtl">{line2}</text></svg>'
              
              temp_svg = os.path.join(IMAGES_CACHE_DIR, "text_layer.svg")
              with open(temp_svg, "w", encoding="utf-8") as f: f.write(svg)
              
              try:
                  subprocess.run(['sharp', 'composite', temp_svg, '--input', bg_to_use, '--output', output_path], check=True, capture_output=True)
              except:
                  temp_png = os.path.join(IMAGES_CACHE_DIR, "temp_text.png")
                  subprocess.run(['sharp', '-i', temp_svg, '-o', temp_png, '--density', '300'], capture_output=True)
                  subprocess.run(['ffmpeg', '-y', '-i', bg_to_use, '-i', temp_png, '-filter_complex', 'overlay=0:0', '-frames:v', '1', output_path], capture_output=True)
                  if os.path.exists(temp_png): os.remove(temp_png)
              
              if os.path.exists(temp_svg): os.remove(temp_svg)
              return os.path.exists(output_path)

          def process_tiktok_reel(video_path, image_path, output_path):
              filter_complex = "[0:v]loop=-1:1:0,setpts=PTS-STARTPTS,scale=1080:1920[bg]; [1:v]setpts=PTS-STARTPTS,crop=ih*4/5:ih:(iw-ow)/2:0,scale=820:1026[v_final]; [bg][v_final]overlay=(W-w)/2:150:shortest=1"
              return run_cmd(["ffmpeg", "-y", "-i", image_path, "-i", video_path, "-filter_complex", filter_complex, "-pix_fmt", "yuv420p", "-c:v", "libx264", "-c:a", "aac", "-b:a", AUDIO_BITRATE, "-shortest", output_path])

          def tg_send_video_requests(filepath, caption):
              try:
                  url = f"https://api.telegram.org/bot{BOT_TOKEN}/sendVideo"
                  with open(filepath, 'rb') as video:
                      response = requests.post(url, data={'chat_id': int(TG_TARGET), 'caption': caption, 'supports_streaming': True}, files={'video': video}, timeout=120)
                      return response.status_code == 200
              except: return False

          async def tg_send_video_telethon(filepath, caption):
              try:
                  client = TelegramClient('session', TELEGRAM_API_ID, TELEGRAM_API_HASH)
                  await client.start(bot_token=TELEGRAM_BOT_TOKEN)
                  await client.send_file(int(TG_TARGET), filepath, caption=caption, supports_streaming=True)
                  await client.disconnect()
                  return True
              except: return False

          def send_video(filepath, caption):
              if os.path.getsize(filepath) > TELEGRAM_LIMIT:
                  return asyncio.run(tg_send_video_telethon(filepath, caption))
              return tg_send_video_requests(filepath, caption)

          def get_youtube_service():
              if not all([YOUTUBE_CLIENT_ID, YOUTUBE_CLIENT_SECRET, YOUTUBE_REFRESH_TOKEN]):
                  log_message("⚠️ YouTube credentials missing")
                  return None
              
              creds = Credentials(
                  token=None,
                  refresh_token=YOUTUBE_REFRESH_TOKEN,
                  token_uri="https://oauth2.googleapis.com/token",
                  client_id=YOUTUBE_CLIENT_ID,
                  client_secret=YOUTUBE_CLIENT_SECRET,
                  scopes=['https://www.googleapis.com/auth/youtube.upload']
              )
              
              if creds.expired:
                  log_message("🔄 Refreshing YouTube token...")
                  creds.refresh(AuthRequest())
                  log_message("✅ YouTube token refreshed")
              
              return build('youtube', 'v3', credentials=creds)

          def upload_to_youtube(video_path, title, publish_time):
              youtube = get_youtube_service()
              if not youtube: return None
              
              try:
                  body = {
                      'snippet': {
                          'title': f"{title} #shorts #islam #quran",
                          'description': f"{title}\n\nتم الرفع آلياً",
                          'categoryId': '22'
                      },
                      'status': {
                          'privacyStatus': 'private',
                          'publishAt': publish_time,
                          'selfDeclaredMadeForKids': False
                      }
                  }
                  
                  media = MediaFileUpload(video_path, chunksize=-1, resumable=True)
                  request = youtube.videos().insert(part='snippet,status', body=body, media_body=media)
                  response = request.execute()
                  
                  if response and response.get('id'):
                      log_message(f"✅ YouTube scheduled! Video ID: {response['id']}")
                      return response['id']
              except Exception as e:
                  log_message(f"❌ YouTube error: {e}")
              return None

          def get_gemini_prompt(transcript):
              return f"""استخرج جميع الأسئلة والإجابات من هذا النص. النص منسق كـ 'HH:MM:SS | النص'.

          التنسيق المطلوب:
          • START_TIME | END_TIME | عنوان السؤال

          القواعد:
          - START_TIME: وقت بداية السؤال
          - END_TIME: وقت نهاية الإجابة
          - العنوان: سؤال مختصر (لا يتجاوز 10 كلمات)

          النص:
          {transcript}"""

          # ========== دوال الجدولة ==========
          def load_schedule():
              if os.path.exists(SCHEDULE_FILE_PATH):
                  try:
                      with open(SCHEDULE_FILE_PATH, 'r', encoding='utf-8') as f:
                          return json.load(f)
                  except: pass
              
              schedule = {
                  "last_updated": datetime.datetime.now(datetime.timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
                  "current_day_index": 0,
                  "current_hour_index": 0,
                  "scheduled_videos": [],
                  "published_videos": []
              }
              save_schedule(schedule)
              return schedule

          def save_schedule(schedule):
              schedule["last_updated"] = datetime.datetime.now(datetime.timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ")
              with open(SCHEDULE_FILE_PATH, 'w', encoding='utf-8') as f:
                  json.dump(schedule, f, indent=2, ensure_ascii=False)

          def get_next_schedule_time():
              schedule = load_schedule()
              now = datetime.datetime.now(datetime.timezone.utc)
              
              if schedule.get("scheduled_videos"):
                  first = schedule["scheduled_videos"][0]
                  pt = datetime.datetime.strptime(first["publish_time"], "%Y-%m-%dT%H:%M:%SZ").replace(tzinfo=datetime.timezone.utc)
                  if pt > now:
                      return pt, first
              
              day_offset = schedule.get("current_day_index", 0)
              hour_offset = schedule.get("current_hour_index", 0)
              
              target_date = now.date()
              
              if hour_offset >= len(PUBLISH_HOURS):
                  hour_offset = 0
                  day_offset += 1
                  target_date += datetime.timedelta(days=day_offset)
              
              target_hour = PUBLISH_HOURS[hour_offset]
              publish_time = datetime.datetime.combine(target_date, datetime.time(target_hour, 0, tzinfo=datetime.timezone.utc))
              
              if publish_time <= now:
                  hour_offset += 1
                  if hour_offset >= len(PUBLISH_HOURS):
                      hour_offset = 0
                      day_offset += 1
                      target_date += datetime.timedelta(days=day_offset)
                      publish_time = datetime.datetime.combine(target_date, datetime.time(PUBLISH_HOURS[0], 0, tzinfo=datetime.timezone.utc))
                  else:
                      publish_time = datetime.datetime.combine(target_date, datetime.time(PUBLISH_HOURS[hour_offset], 0, tzinfo=datetime.timezone.utc))
              
              schedule["current_day_index"] = day_offset
              schedule["current_hour_index"] = hour_offset + 1 if hour_offset + 1 < len(PUBLISH_HOURS) else 0
              if hour_offset + 1 >= len(PUBLISH_HOURS):
                  schedule["current_day_index"] = day_offset + 1
              
              save_schedule(schedule)
              return publish_time, None

          def add_to_schedule(video_title, video_path, clip_index):
              schedule = load_schedule()
              publish_time, _ = get_next_schedule_time()
              
              scheduled = {
                  "id": f"{datetime.datetime.now().strftime('%Y%m%d%H%M%S')}_{clip_index}",
                  "title": video_title,
                  "video_path": video_path,
                  "publish_time": publish_time.strftime("%Y-%m-%dT%H:%M:%SZ"),
                  "status": "scheduled"
              }
              
              schedule["scheduled_videos"].append(scheduled)
              save_schedule(schedule)
              log_message(f"📅 Scheduled: {video_title} at {scheduled['publish_time']}")
              return scheduled

          # ========== المعالجة الرئيسية ==========
          def process_video(youtube_url):
              log_message(f"\n{'='*60}\nProcessing: {youtube_url}\n{'='*60}")
              
              # 1. التحقق من وجود ترجمة أولاً
              if not check_subtitles(youtube_url):
                  log_message("❌ Video skipped: No Arabic subtitles available")
                  return False
              
              # 2. تحميل الفيديو
              log_message("📥 Downloading video...")
              with open(COOKIES_FILE, "w") as f:
                  f.write(COOKIES_TEXT)
              
              if not run_cmd(["yt-dlp", "--cookies", COOKIES_FILE, "-f", "bestvideo+bestaudio/best", "--merge-output-format", "mp4", "-o", TEMP_VIDEO, youtube_url]):
                  log_message("❌ Download failed")
                  if os.path.exists(COOKIES_FILE): os.remove(COOKIES_FILE)
                  return False
              
              os.remove(COOKIES_FILE)
              video_duration = get_duration(TEMP_VIDEO)
              log_message(f"📹 Duration: {seconds_to_time(video_duration)}")
              
              # 3. الحصول على الترجمة
              if not os.path.exists(EXPECTED_VTT):
                  log_message("❌ Subtitle file not found")
                  return False
              
              with open(EXPECTED_VTT, "r") as f:
                  lines = [line.strip() for line in f if line.strip() and not any(x in line for x in ['WEBVTT', 'Kind:', 'Language:', '-->'])]
              with open(FINAL_TRANSCRIPT, "w") as f:
                  f.write('\n'.join(lines))
              
              # 4. Gemini
              log_message("🤖 Analyzing with Gemini...")
              with open(FINAL_TRANSCRIPT, "r") as f:
                  transcript_data = f.read()
              
              response = requests.post(
                  f"https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key={GEMINI_KEY}",
                  headers={"Content-Type": "application/json"},
                  json={"contents": [{"parts": [{"text": get_gemini_prompt(transcript_data)}]}]}
              )
              
              if response.status_code != 200:
                  log_message(f"❌ Gemini error: {response.status_code}")
                  return False
              
              gemini_result = response.json()['candidates'][0]['content']['parts'][0]['text']
              
              # 5. استخراج المقاطع
              clips = []
              for line in gemini_result.strip().split('\n'):
                  if '|' in line:
                      parts = [p.strip() for p in line.lstrip('• ').split('|')]
                      if len(parts) >= 3:
                          new_start, new_end = adjust_timestamp(parts[0], parts[1], video_duration)
                          clips.append({'start': new_start, 'end': new_end, 'title': parts[2]})
                          log_message(f"  📍 Clip: {parts[0]}→{parts[1]} => {new_start}→{new_end}")
              
              if not clips:
                  log_message("❌ No clips found")
                  return False
              
              # 6. معالجة المقاطع
              for idx, clip in enumerate(clips, 1):
                  log_message(f"\n🎬 Clip {idx}/{len(clips)}: {clip['title']}")
                  safe_name = "".join(c for c in clip['title'] if c.isalnum() or c == ' ').replace(' ', '_')[:100]
                  raw_clip = f"raw_{idx}.mp4"
                  vad_clip = f"vad_{idx}.mp4"
                  img_path = f"img_{idx}.png"
                  output_path = f"{idx:02d}_{safe_name}.mp4"
                  
                  if not extract_clip(TEMP_VIDEO, clip['start'], clip['end'], raw_clip):
                      log_message("  ❌ Cut failed")
                      continue
                  
                  remove_silence_from_video(raw_clip, vad_clip)
                  
                  if not create_image_with_title(clip['title'], img_path):
                      log_message("  ❌ Image creation failed")
                      continue
                  
                  if process_tiktok_reel(vad_clip, img_path, output_path):
                      log_message(f"  ✅ Merged successfully")
                      send_video(output_path, clip['title'])
                      
                      scheduled = add_to_schedule(clip['title'], output_path, idx)
                      upload_to_youtube(output_path, clip['title'], scheduled["publish_time"])
                  else:
                      log_message("  ❌ Merge failed")
                  
                  for f in [raw_clip, vad_clip, img_path, output_path]:
                      if os.path.exists(f): os.remove(f)
              
              os.remove(TEMP_VIDEO)
              return True

          # ========== التشغيل ==========
          log_message("="*60)
          log_message("YouTube Ultimate QA Extractor - Daily Schedule Mode")
          log_message(f"Run at: {datetime.datetime.now().strftime('%Y-%m-%d %H:%M:%S')}")
          log_message("="*60)
          
          # التحقق من المتطلبات
          if not GITHUB_TOKEN:
              log_message("❌ GITHUB_TOKEN not found!")
              sys.exit(1)
          
          if not COOKIES_TEXT:
              log_message("❌ COOKIES_TEXT not found!")
              sys.exit(1)
          
          if not GEMINI_KEY:
              log_message("❌ GEMINI_API_KEY not found!")
              sys.exit(1)
          
          # الحصول على أول رابط
          first_url, remaining_urls, file_sha = get_first_url()
          
          if not first_url:
              log_message("✅ No videos to process today")
              sys.exit(0)
          
          # معالجة الفيديو
          log_message(f"\n🚀 Processing: {first_url}")
          success = process_video(first_url)
          
          # حذف الرابط فقط إذا نجحت المعالجة بالكامل
          if success:
              if update_videos_file(remaining_urls, file_sha):
                  log_message(f"\n✅ Video processed successfully and removed from list!")
              else:
                  log_message(f"\n⚠️ Video processed but failed to update list")
          else:
              log_message(f"\n❌ Video processing failed. URL remains in videos.txt")
              log_message("⚠️ Please check the video manually")
              sys.exit(1)
          
          # عرض حالة الجدولة
          schedule = load_schedule()
          log_message(f"\n📊 Schedule Status:")
          log_message(f"   - Scheduled videos: {len(schedule.get('scheduled_videos', []))}")
          if schedule.get('scheduled_videos'):
              log_message("\n📅 Next scheduled videos:")
              for v in schedule['scheduled_videos'][:3]:
                  log_message(f"   - {v['title']} at {v['publish_time']}")
          
          log_message("\n🏁 Daily job completed successfully!")
